        // --- COMPONENTE: TABLERO COMPARTIDO ---
        function Board({ gameState, onAnimationComplete }) {
            const playersOnBoard = gameState?.players?.filter(p => p.hasJoined) || [];
            const [displayPositions, setDisplayPositions] = useState({});
            const [animationPhase, setAnimationPhase] = useState('idle'); // 'rolling', 'result', 'moving', 'idle'
            const [currentRoll, setCurrentRoll] = useState(null);
            const [selectedSpace, setSelectedSpace] = useState(null);
            useEffect(() => {
                if (gameState?.activeRoll && gameState.activeRoll.timestamp !== currentRoll?.timestamp) {
                    const roll = gameState.activeRoll;
                    setCurrentRoll(roll);
                    setAnimationPhase('rolling');
                    setDisplayPositions(prev => ({ ...prev, [roll.playerId]: roll.from }));

                    setTimeout(() => {
                        setAnimationPhase('result');
                        setTimeout(() => {
                            setAnimationPhase('moving');
                            let currentPos = roll.from;
                            const targetPos = roll.to;
                            const totalSteps = currentPos <= targetPos ? (targetPos - currentPos) : (40 - currentPos + targetPos);
                            let step = 0;
                            
                            const interval = setInterval(() => {
                                step++;
                                currentPos = (currentPos + 1) % 40;
                                setDisplayPositions(prev => ({ ...prev, [roll.playerId]: currentPos }));
                                
                                if (step >= totalSteps) {
                                    clearInterval(interval);
                                    setAnimationPhase('idle');
                                    if (onAnimationComplete) onAnimationComplete(roll);
                                }
                            }, 300);
                        }, 2000);
                    }, 1500);
                }
            }, [gameState?.activeRoll]);

            return (
                <div className="w-full aspect-square bg-white border-2 border-slate-800 shadow-2xl relative text-slate-900"
                style={{ display: 'grid', gridTemplateColumns: 'repeat(11, minmax(0, 1fr))', gridTemplateRows: 'repeat(11, minmax(0, 1fr))' }} >

                {/* TARJETA PROPIEDAD */}
                {selectedSpace && (
                    <PropertyCard
                        space={selectedSpace}
                        owner={gameState?.players?.find(p => p.properties?.includes(selectedSpace.id))}
                        onClose={() => setSelectedSpace(null)}
                    />
                )}
                
                <div className="bg-[#cde6d0] border border-slate-800 shadow-inner flex flex-col items-center justify-center relative z-0 p-4 sm:p-8" style={{ gridColumn: '2 / 11', gridRow: '2 / 11' }}>
                    <div className="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                    
                    {/* BOTE DE PARKING GRATUITO */}
                    <div className="absolute top-8 sm:top-12 left-8 sm:left-12 bg-white/80 backdrop-blur-md border-2 border-blue-500 rounded-2xl p-2 sm:p-4 shadow-xl flex flex-col items-center justify-center z-10 rotate-[-15deg] min-w-[60px] sm:min-w-[100px]">
                        <span className="text-xl sm:text-4xl mb-1">🚘</span>
                        <span className="text-[6px] sm:text-[10px] font-black uppercase tracking-widest text-slate-600 mb-1 leading-none text-center">Bote<br/>Parking</span>
                        <span className="text-sm sm:text-2xl font-black text-green-600">M{gameState?.freeParkingPot || 0}</span>
                    </div>

                    <div className="rotate-[-45deg] text-center">
                        <h1 className="text-4xl sm:text-7xl font-black text-red-600 drop-shadow-sm uppercase tracking-tighter border-4 sm:border-8 border-red-600 p-2 sm:p-4 bg-white">
                            PATOPOLY
                        </h1>
                        <h2 className="text-sm sm:text-2xl font-bold mt-2 text-slate-800 uppercase tracking-widest bg-white inline-block px-2 sm:px-4 py-1 border-2 border-slate-800">
                            Barcelona
                        </h2>
                    </div>
                </div>

                {/* OVERLAY: solo opaco en rolling y result */}
                {(animationPhase === 'rolling' || animationPhase === 'result') && currentRoll && (
                    <div className="absolute inset-0 bg-black/70 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
                        {animationPhase === 'rolling' && (
                            <div className="flex gap-6 animate-bounce">
                                <Dices className="w-24 h-24 sm:w-32 sm:h-32 text-white animate-spin drop-shadow-[0_0_20px_rgba(255,255,255,0.9)]" />
                                <Dices className="w-24 h-24 sm:w-32 sm:h-32 text-white animate-spin drop-shadow-[0_0_20px_rgba(255,255,255,0.9)]" style={{animationDirection: 'reverse'}} />
                            </div>
                        )}
                        {animationPhase === 'result' && (
                            <div className="bg-gradient-to-b from-yellow-300 to-yellow-600 p-1 rounded-2xl shadow-[0_0_40px_rgba(250,204,21,0.6)]">
                                <div className="bg-slate-900 px-6 sm:px-10 py-4 sm:py-6 rounded-xl flex flex-col items-center border border-yellow-500/50">
                                    <div className="text-4xl sm:text-6xl mb-2 sm:mb-3">{currentRoll.token}</div>

                return () => unsubscribe();
            }, [user, gameId]);

            const handleJoin = async (targetPlayerId) => {
                if (!selectedToken) return;
                const updatedPlayers = gameState.players.map(p => p.id === targetPlayerId ? { ...p, hasJoined: true, token: selectedToken } : p);
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { 
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `¡${gameState.players.find(p=>p.id===targetPlayerId).name} se ha unido con ${selectedToken}!`]
                    });
                    setPlayerId(targetPlayerId);
                } catch (error) { console.error(error); }
            };

            const rollDice = async () => {
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return; // No es tu turno
                if (gameState.isAnimating) return; // Bloquear si hay animación en curso
                
                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                const totalMove = d1 + d2;
                const isDoubles = d1 === d2;
                
                const me = gameState.players.find(p => p.id === playerId);

                // --- JAIL LOGIC ---
                if (me.inJail) {
                    let newJailTurns = (me.jailTurns || 0) + 1;
                    
                    if (isDoubles) {
                        let logMsg = `¡${me.name} tiró ${d1} y ${d2} (dobles) y sale de la cárcel gratis! Se mueve ${totalMove}.`;
                        let newPos = (me.position + totalMove) % 40;
                        const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, position: newPos } : p);
                        
                        let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                        let loopCount = 0;
                        while (!gameState.players[nextTurn].hasJoined && loopCount < gameState.players.length) { nextTurn = (nextTurn + 1) % gameState.players.length; loopCount++; }
                        
                        const activeRoll = { playerId: me.id, playerName: me.name, token: me.token, d1, d2, totalMove, from: me.position, to: newPos, nextTurnIndex: nextTurn, timestamp: Date.now(), passedGo: false };
                        try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { players: updatedPlayers, activeRoll, isAnimating: true, logs: [...(gameState.logs || []), logMsg] }); } catch(e) { console.error(e); }
                        return;
                    } else {
                        if (newJailTurns >= 3) {
                            let newBalance = Math.max(0, me.balance - 50);
                            let newPos = (me.position + totalMove) % 40;
                            let logMsg = `¡${me.name} tiró ${d1} y ${d2}. Al ser su 3er turno, pagó M50 obligatoriamente, sale de la cárcel y mueve ${totalMove}.`;
                            const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, balance: newBalance, position: newPos } : p);
                            
                            let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                            let loopCount = 0;
                            while (!gameState.players[nextTurn].hasJoined && loopCount < gameState.players.length) { nextTurn = (nextTurn + 1) % gameState.players.length; loopCount++; }
                            
                            const activeRoll = { playerId: me.id, playerName: me.name, token: me.token, d1, d2, totalMove, from: me.position, to: newPos, nextTurnIndex: nextTurn, timestamp: Date.now(), passedGo: false };
                            try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { players: updatedPlayers, freeParkingPot: (gameState.freeParkingPot || 0) + 50, activeRoll, isAnimating: true, logs: [...(gameState.logs || []), logMsg] }); } catch(e) { console.error(e); }
                            return;
                        } else {
                            let logMsg = `${me.name} tiró ${d1} y ${d2}. No sacó dobles y sigue en la cárcel (Turno ${newJailTurns}).`;
                            const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, jailTurns: newJailTurns } : p);
                            let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                            let loopCount = 0;
                            while (!gameState.players[nextTurn].hasJoined && loopCount < gameState.players.length) { nextTurn = (nextTurn + 1) % gameState.players.length; loopCount++; }
                            try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { players: updatedPlayers, currentTurnIndex: nextTurn, logs: [...(gameState.logs || []), logMsg] }); } catch(e) { console.error(e); }
                            return;
                        }
                    }
                }
                // --- END JAIL LOGIC ---

                let newPos = me.position + totalMove;
                let newBalance = me.balance;
                let passedGo = false;

                if (newPos >= 40) {
                    newPos = newPos % 40;
                    newBalance += 200; // Pasó por la Salida
                    passedGo = true;
                }

                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, position: newPos, balance: newBalance };
                    }
                    return p;
                });

                // Calculamos el siguiente turno pero NO actualizamos currentTurnIndex todavía
                let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                let loopCount = 0;
                while (!gameState.players[nextTurn].hasJoined && loopCount < gameState.players.length) {
                    nextTurn = (nextTurn + 1) % gameState.players.length;
                    loopCount++;
                }

                let logMsg = `${me.name} tiró ${d1} y ${d2} (${totalMove}) y cayó en ${boardSpaces[newPos].name}.`;
                if(passedGo) logMsg += " ¡Cobró M200 por pasar por la Salida!";

                const activeRoll = {
                    playerId: me.id,
                    playerName: me.name,
                    token: me.token,
                    d1, d2, totalMove,
                    from: me.position,
                    to: newPos,
                    nextTurnIndex: nextTurn,
                    timestamp: Date.now(),
                    passedGo
                };

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        activeRoll: activeRoll,
                        isAnimating: true,
                        logs: [...(gameState.logs || []), logMsg]
                    });
                } catch(e) { console.error(e); }
            };

            const handleAnimationComplete = async (roll) => {
                if (roll.playerId === playerId) {
                    const landedSpace = boardSpaces[roll.to];
                    const isOwnable = landedSpace && (landedSpace.type === 'property' || landedSpace.type === 'station' || landedSpace.type === 'utility');
                    const alreadyOwned = gameState.players.some(p => p.properties && p.properties.includes(landedSpace.id));
                    const isTax = landedSpace && landedSpace.type === 'tax';
                    const isFreeParking = landedSpace && landedSpace.id === 20;
                    const isGoToJail = landedSpace && landedSpace.id === 30;
                    const isChance = landedSpace && landedSpace.type === 'chance';
                    const isCommunity = landedSpace && landedSpace.type === 'community';
                    
                    if (isGoToJail) {
                        const updatedPlayers = gameState.players.map(p => {
                            if (p.id === playerId) return { ...p, position: 10, inJail: true, jailTurns: 0 };
                            return p;
                        });
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                currentTurnIndex: roll.nextTurnIndex,
                                isAnimating: false,
                                players: updatedPlayers,
                                logs: [...(gameState.logs || []), `¡${me.name} ha sido enviado directamente a la cárcel!`]
                            });
                        } catch(e) { console.error(e); }
                    } else if (isChance || isCommunity) {
                        const deck = isChance ? chanceCards : communityChestCards;
                        const randomCard = deck[Math.floor(Math.random() * deck.length)];
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                activeCard: { 
                                    type: isChance ? 'chance' : 'community', 
                                    cardId: randomCard.id, 
                                    playerId: roll.playerId, 
                                    nextTurnIndex: roll.nextTurnIndex 
                                }
                            });
                        } catch(e) { console.error(e); }
                    } else if (isTax) {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                awaitingTax: { playerId: roll.playerId, spaceId: roll.to, amount: landedSpace.price, nextTurnIndex: roll.nextTurnIndex }
                            });
                        } catch(e) { console.error(e); }
                    } else if (isOwnable && !alreadyOwned) {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                awaitingPurchase: { playerId: roll.playerId, spaceId: roll.to, nextTurnIndex: roll.nextTurnIndex }
                            });
                        } catch(e) { console.error(e); }
                    } else if (isFreeParking && (gameState.freeParkingPot || 0) > 0) {
                        const potAmount = gameState.freeParkingPot || 0;
                        const updatedPlayers = gameState.players.map(p => {
                            if (p.id === playerId) return { ...p, balance: p.balance + potAmount };
                            return p;
                        });
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                currentTurnIndex: roll.nextTurnIndex,
                                isAnimating: false,
                                players: updatedPlayers,
                                freeParkingPot: 0,
                                logs: [...(gameState.logs || []), `¡${me.name} ha caído en Parking Gratuito y se ha llevado el bote de M${potAmount}!`]
                            });
                        } catch(e) { console.error(e); }
                    } else {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                currentTurnIndex: roll.nextTurnIndex,
                                isAnimating: false
                            });
                        } catch(e) { console.error(e); }
                    }
                }
            };

            const handleUseJailCard = async () => {
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return;
                if (!me.inJail || !me.getOutJailFreeCards || me.getOutJailFreeCards <= 0) return;
                
                const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, getOutJailFreeCards: p.getOutJailFreeCards - 1 } : p);
                const logMsg = `${me.name} usó una carta para salir gratis de la cárcel.`;
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), logMsg]
                    });
                } catch (e) { console.error(e); }
            };

            const handleAcceptCard = async () => {
                const ac = gameState.activeCard;
                if (!ac || ac.playerId !== playerId) return;
                
                const deck = ac.type === 'chance' ? chanceCards : communityChestCards;
                const card = deck.find(c => c.id === ac.cardId);
                if (!card) return;

                let updateData = { activeCard: null, currentTurnIndex: ac.nextTurnIndex };
                let updatedPlayers = [...gameState.players];
                let pIndex = updatedPlayers.findIndex(p => p.id === playerId);
                let meUpdated = { ...updatedPlayers[pIndex] };
                let newPot = gameState.freeParkingPot || 0;
                let logMsg = `${meUpdated.name} sacó una carta: "${card.text}"`;

                if (card.action === 'moveTo') {
                    meUpdated.position = card.value;
                    if (card.value === 0 || (card.id === 'c2' && meUpdated.position < 24)) {
                        if (card.value < meUpdated.position && card.value !== 0) meUpdated.balance += 200;
                        else if (card.value === 0) meUpdated.balance += 200;
                    }
                    updateData.activeRoll = { playerId: meUpdated.id, playerName: meUpdated.name, token: meUpdated.token, d1: 0, d2: 0, totalMove: 0, from: meUpdated.position, to: card.value, nextTurnIndex: ac.nextTurnIndex, timestamp: Date.now(), passedGo: false };
                    updateData.isAnimating = true;
                    delete updateData.currentTurnIndex; 
                } else if (card.action === 'moveRelative') {
                    let newPos = meUpdated.position + card.value;
                    if (newPos < 0) newPos += 40;
                    meUpdated.position = newPos;
                    updateData.activeRoll = { playerId: meUpdated.id, playerName: meUpdated.name, token: meUpdated.token, d1: 0, d2: 0, totalMove: 0, from: meUpdated.position, to: newPos, nextTurnIndex: ac.nextTurnIndex, timestamp: Date.now(), passedGo: false };
                    updateData.isAnimating = true;
                    delete updateData.currentTurnIndex; 
                } else if (card.action === 'goToJail') {
                    meUpdated.position = 10;
                    meUpdated.inJail = true;
                    meUpdated.jailTurns = 0;
                } else if (card.action === 'payBank') {
                    meUpdated.balance -= card.value;
                    newPot += card.value;
                    updateData.freeParkingPot = newPot;
                } else if (card.action === 'receiveBank') {
                    meUpdated.balance += card.value;
                } else if (card.action === 'payPlayers') {
                    updatedPlayers = updatedPlayers.map(p => p.id === playerId ? { ...p, balance: p.balance - (card.value * (updatedPlayers.length - 1)) } : { ...p, balance: p.balance + card.value });
                    meUpdated = updatedPlayers[pIndex];
                } else if (card.action === 'receivePlayers') {
                    updatedPlayers = updatedPlayers.map(p => p.id === playerId ? { ...p, balance: p.balance + (card.value * (updatedPlayers.length - 1)) } : { ...p, balance: p.balance - card.value });
                    meUpdated = updatedPlayers[pIndex];
                } else if (card.action === 'jailFree') {
                    meUpdated.getOutJailFreeCards = (meUpdated.getOutJailFreeCards || 0) + 1;
                } else if (card.action === 'repairs') {
                    let cost = (meUpdated.properties ? meUpdated.properties.length : 0) * card.value;
                    meUpdated.balance -= cost;
                    newPot += cost;
                    updateData.freeParkingPot = newPot;
                    logMsg += ` (Pagó M${cost})`;
                }

                updatedPlayers[pIndex] = meUpdated;
                updateData.players = updatedPlayers;
                updateData.logs = [...(gameState.logs || []), logMsg];

                try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updateData); } catch(e) { console.error(e); }
            };

            const handlePayJail = async () => {
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return;
                if (!me.inJail || me.balance < 50) return;
                
                const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, balance: p.balance - 50 } : p);
                const logMsg = `${me.name} pagó M50 para salir de la cárcel.`;
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        freeParkingPot: (gameState.freeParkingPot || 0) + 50,
                        logs: [...(gameState.logs || []), logMsg]
                    });
                } catch (e) { console.error(e); }
            };

            const handleBuyProperty = async (accept) => {
                const ap = gameState.awaitingPurchase;
                if (!ap || ap.playerId !== playerId) return;
                const space = boardSpaces[ap.spaceId];
                let updateData = {
                    awaitingPurchase: null,
                    currentTurnIndex: ap.nextTurnIndex
                };
                if (accept && me.balance >= space.price) {
                    updateData.players = gameState.players.map(p => {
                        if (p.id === playerId) {
                            return { ...p, balance: p.balance - space.price, properties: [...(p.properties || []), space.id] };
                        }
                        return p;
                    });
                    updateData.logs = [...(gameState.logs || []), `${me.name} ha comprado ${space.name} por M${space.price}.`];
                }
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updateData);
                } catch(e) { console.error(e); }
            };

            const handlePayTax = async () => {
                const at = gameState.awaitingTax;
                if (!at || at.playerId !== playerId) return;
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) return { ...p, balance: Math.max(0, p.balance - at.amount) };
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        awaitingTax: null,
                        currentTurnIndex: at.nextTurnIndex,
                        players: updatedPlayers,
                        freeParkingPot: (gameState.freeParkingPot || 0) + at.amount,
                        logs: [...(gameState.logs || []), `${me.name} pagó M${at.amount} de impuestos que van al bote.`]
                    });
                } catch(e) { console.error(e); }
            };

            const handleMortgage = async (spaceId) => {
                const space = boardSpaces[spaceId];
                const mortgageVal = space.mortgage || Math.floor(space.price / 2);
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, balance: p.balance + mortgageVal, mortgaged: [...(p.mortgaged || []), spaceId] };
                    }
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} hipotecó ${space.name} y cobró M${mortgageVal}.`]
                    });
                    setSelectedSpacePC(null);
                } catch(e) { console.error(e); }
            };

            const handleUnmortgage = async (spaceId) => {
                const space = boardSpaces[spaceId];
                const mortgageVal = space.mortgage || Math.floor(space.price / 2);
                const unmortgageVal = Math.floor(mortgageVal * 1.1);
                if (me.balance < unmortgageVal) return;
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, balance: p.balance - unmortgageVal, mortgaged: (p.mortgaged || []).filter(id => id !== spaceId) };
                    }
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} deshipotecó ${space.name} pagando M${unmortgageVal}.`]
                    });
                    setSelectedSpacePC(null);
                } catch(e) { console.error(e); }
            };

            if (!gameState) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Cargando sala...</div>;

            const me = gameState.players.find(p => p.id === playerId);

            // PANTALLA DE SELECCIÓN DE FICHA
            if (!me || !me.hasJoined) {
                const availablePlayers = gameState.players.filter(p => !p.hasJoined);
                const takenTokens = gameState.players.filter(p => p.hasJoined).map(p => p.token);
                
                if (availablePlayers.length === 0) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-red-500 font-bold">Sala llena</div>;

                return (
                    <div className="min-h-screen bg-cover bg-center flex flex-col items-center justify-center p-4 relative" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-0"></div>
                        <div className="glass-panel w-full max-w-md rounded-3xl p-6 shadow-2xl border border-white/10 relative z-10">
                            
                            {!playerId ? (
                                <div className="animate-fade-in">
                                    <h1 className="text-3xl font-black text-center text-white mb-2">Unirse a la Partida</h1>
                                    <p className="text-slate-300 text-center mb-8">¿Quién eres?</p>
                                    <div className="space-y-3">
                                        {availablePlayers.map(p => (
                                            <button key={p.id} onClick={() => setPlayerId(p.id)} className="w-full text-left p-4 rounded-xl border-2 border-slate-700 bg-slate-800/50 text-slate-200 hover:bg-slate-700 hover:border-slate-500 font-medium transition flex items-center group">
                                                <UserCircle2 className="w-6 h-6 mr-3 opacity-50 group-hover:opacity-100 group-hover:text-blue-400 transition" /> 
                                                <span className="text-lg">{p.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-fade-in flex flex-col h-full">
                                    <button onClick={() => setPlayerId('')} className="text-slate-400 hover:text-white flex items-center gap-2 mb-6 text-sm font-bold uppercase tracking-wider transition w-fit">
                                        <ArrowRight className="w-4 h-4 rotate-180" /> Volver
                                    </button>
                                    <h1 className="text-2xl font-black text-center text-white mb-2">Elige tu Ficha</h1>
                                    <p className="text-slate-300 text-center mb-8">Selecciona la ficha con la que jugarás</p>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-8">
                                        {availableTokens.map(token => {
                                            const isTaken = takenTokens.includes(token.emoji);
                                            const isSelected = selectedToken === token.emoji;
                                            return (
                                                <button key={token.emoji} disabled={isTaken} onClick={() => setSelectedToken(token.emoji)} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all ${isTaken ? 'opacity-30 cursor-not-allowed border-slate-800 bg-slate-900/50' : isSelected ? 'border-green-500 bg-green-500/20 scale-105 shadow-[0_0_15px_rgba(34,197,94,0.3)]' : 'border-slate-700 bg-slate-800/50 hover:border-slate-500 hover:bg-slate-700'}`}>
                                                    <span className="text-5xl mb-2 drop-shadow-lg">{token.emoji}</span>
                                                    <span className={`text-[10px] sm:text-xs font-bold uppercase tracking-wider ${isSelected ? 'text-green-400' : 'text-slate-300'}`}>{token.name}</span>
                                                    {isTaken && <span className="text-[10px] text-red-400 mt-1 uppercase font-black">Ocupada</span>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => handleJoin(playerId)} disabled={!selectedToken} className="w-full bg-gradient-to-r from-green-500 to-green-600 disabled:opacity-50 text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg uppercase tracking-wide hover:from-green-400 hover:to-green-500 transform active:scale-95 disabled:active:scale-100 mt-auto">Entrar al Tablero</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // PANTALLA PRINCIPAL DE JUGADOR (TABLERO + CONTROLES)
            const isMyTurn = gameState.players[gameState.currentTurnIndex].id === playerId;
            const myPurchase = gameState.awaitingPurchase && gameState.awaitingPurchase.playerId === playerId ? gameState.awaitingPurchase : null;

            return (
                <div className="min-h-screen lg:h-screen flex flex-col lg:flex-row pb-safe text-white lg:overflow-hidden bg-cover bg-center relative" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                    {/* TARJETA DE PROPIEDAD DESDE PANEL */}
                    {selectedSpacePC && (() => {
                        const pcOwner = gameState.players.find(p => p.properties?.includes(selectedSpacePC.id));
                        const pcIsOwner = pcOwner?.id === playerId;
                        const pcIsMortgaged = pcOwner?.mortgaged?.includes(selectedSpacePC.id) || false;
                        return (
                            <PropertyCard
                                space={selectedSpacePC}
                                owner={pcOwner}
                                isMortgaged={pcIsMortgaged}
                                isOwner={pcIsOwner}
                                onMortgage={() => handleMortgage(selectedSpacePC.id)}
                                onUnmortgage={() => handleUnmortgage(selectedSpacePC.id)}
                                onClose={() => setSelectedSpacePC(null)}
                            />
                        );
                    })()}
                    {/* MODAL IMPUESTO */}
                    {gameState.awaitingTax && gameState.awaitingTax.playerId === playerId && (() => {
                        const taxSpace = boardSpaces[gameState.awaitingTax.spaceId];
                        return (
                            <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                <div className="bg-slate-900 border border-white/10 rounded-3xl shadow-2xl max-w-sm w-full p-6 flex flex-col items-center gap-5">
                                    <div className="text-6xl">💸</div>
                                    <h2 className="text-2xl font-black text-white text-center uppercase tracking-wider">{taxSpace.name}</h2>
                                    <p className="text-slate-400 text-sm text-center">Debes pagar al banco</p>
                                    <div className="bg-slate-800 rounded-2xl px-8 py-4 text-center border border-slate-700">
                                        <p className="text-4xl font-black text-red-400">M{gameState.awaitingTax.amount}</p>
                                    </div>
                                    <button onClick={handlePayTax} className="w-full py-4 rounded-xl bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-black text-lg transition border border-red-500 shadow-lg uppercase tracking-wider">Pagar</button>
                                </div>
                            </div>
                        );
                    })()}
                    {/* MODAL COMPRA DE PROPIEDAD */}
                    {myPurchase && (() => {
                        const space = boardSpaces[myPurchase.spaceId];
                        const canAfford = me.balance >= space.price;
                        return (
                            <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                <div className="bg-slate-900 border border-white/10 rounded-3xl shadow-2xl max-w-sm w-full p-6 flex flex-col items-center gap-5">
                                    <div className={`w-full h-3 rounded-t-xl ${space.color || 'bg-gray-400'}`}></div>
                                    <div className="text-5xl">{me.token}</div>
                                    <h2 className="text-2xl font-black text-white text-center uppercase tracking-wider">{space.name}</h2>
                                    <p className="text-slate-400 text-sm text-center">Has caído en esta propiedad. ¿Deseas comprarla?</p>
                                    <div className="bg-slate-800 rounded-2xl px-8 py-4 text-center border border-slate-700">
                                        <p className="text-slate-400 text-xs uppercase font-bold tracking-widest mb-1">Precio</p>
                                        <p className="text-4xl font-black text-yellow-400">M{space.price}</p>
                                        {!canAfford && <p className="text-red-400 text-xs mt-1 font-bold">No tienes suficiente dinero</p>}
                                    </div>
                                    <div className="flex gap-3 w-full">
                                        <button onClick={() => handleBuyProperty(false)} className="flex-1 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-black text-lg transition border border-slate-600">Pasar</button>
                                        <button onClick={() => handleBuyProperty(true)} disabled={!canAfford} className={`flex-1 py-3 rounded-xl font-black text-lg transition ${canAfford ? 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white shadow-[0_0_20px_rgba(34,197,94,0.3)]' : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'}`}>Comprar</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* MODAL DE CARTA (SUERTE / COMUNIDAD) */}
                    {(() => {
                        const ac = gameState.activeCard;
                        if (!ac) return null;
                        const isMyTurnForCard = ac.playerId === playerId;
                        const deck = ac.type === 'chance' ? chanceCards : communityChestCards;
                        const card = deck.find(c => c.id === ac.cardId);
                        if (!card) return null;
                        
                        return (
                            <div className="absolute inset-0 z-[110] flex items-center justify-center p-4">
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={() => {}} />
                                <div className={`relative w-full max-w-sm rounded-3xl p-6 sm:p-8 flex flex-col items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-4 ${ac.type === 'chance' ? 'bg-orange-50 border-orange-500' : 'bg-blue-50 border-blue-500'}`}>
                                    <div className="text-6xl mb-4 drop-shadow-md">
                                        {ac.type === 'chance' ? '❓' : '🎁'}
                                    </div>
                                    <h2 className={`text-2xl font-black uppercase tracking-widest mb-6 ${ac.type === 'chance' ? 'text-orange-600' : 'text-blue-600'}`}>
                                        {ac.type === 'chance' ? 'Suerte' : 'Caja de Comunidad'}
                                    </h2>
                                    
                                    <div className="text-center bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-inner w-full mb-6">
                                        <p className="text-xl font-bold text-slate-800 leading-snug">
                                            {card.text}
                                        </p>
                                    </div>
                                    
                                    {isMyTurnForCard ? (
                                        <button onClick={handleAcceptCard} className={`w-full py-4 rounded-xl font-black text-xl text-white shadow-lg transition active:scale-95 ${ac.type === 'chance' ? 'bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-400 hover:to-red-400' : 'bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500'}`}>
                                            Aceptar
                                        </button>
                                    ) : (
                                        <div className="w-full py-4 rounded-xl bg-slate-200 text-slate-500 font-bold text-center border border-slate-300">
                                            Esperando a {gameState.players.find(p => p.id === ac.playerId)?.name}...
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })()}

                    <div className="absolute inset-0 bg-slate-900/30 backdrop-blur-sm z-0"></div>
                    
                    {/* PANEL IZQUIERDO: TABLERO */}
                    <div className="w-full lg:w-[70%] h-full p-2 lg:p-6 flex items-center justify-center border-b lg:border-b-0 lg:border-r border-slate-800/50 bg-slate-950/40 lg:overflow-hidden relative z-10">
                        <div className="w-full max-w-[95vmin] lg:max-w-[96vh] drop-shadow-2xl flex-shrink-0">
                            <Board gameState={gameState} onAnimationComplete={handleAnimationComplete} />
                        </div>
                    </div>

                    {/* PANEL DERECHO: CONTROLES DEL JUGADOR */}
                    <div className="w-full lg:w-[30%] flex flex-col h-full bg-slate-900 shadow-[-10px_0_30px_rgba(0,0,0,0.5)] relative z-20 overflow-hidden">
                        
                        {/* TOP SECTION: Jugador + Acciones */}
                        <div className="p-4 sm:p-5 bg-slate-800 border-b border-slate-700 shadow-md relative z-10 flex flex-col gap-4">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="text-3xl bg-slate-900/50 w-12 h-12 rounded-full flex items-center justify-center border border-white/10 shadow-inner">{me.token}</div>
                                    <div>
                                        <h2 className="text-xl font-black text-white leading-tight truncate max-w-[150px]">{me.name}</h2>
                                        <div className="flex items-center gap-1.5 mt-0.5">
                                            <div className={`w-2 h-2 rounded-full ${isMyTurn ? 'bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-slate-600'}`}></div>
                                            <p className={`text-[10px] font-bold uppercase tracking-wider ${isMyTurn ? 'text-green-400' : 'text-slate-400'}`}>
                                                {isMyTurn ? 'Tu turno' : 'Esperando'}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    {isMyTurn && me.inJail && (
                                        <button 
                                            onClick={handlePayJail}
                                            disabled={me.balance < 50 || gameState.isAnimating}
                                            className="p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md bg-gradient-to-br from-red-600 to-orange-700 hover:from-red-500 hover:to-orange-600 active:scale-95 border border-red-400/30">
                                            <span className="font-bold text-xs uppercase hidden xl:inline text-white">Pagar M50</span>
                                        </button>
                                    )}
                                    <button 
                                        onClick={rollDice}
                                        disabled={!isMyTurn || gameState.isAnimating}
                                        className={`p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md ${isMyTurn && !gameState.isAnimating ? (me.inJail ? 'bg-gradient-to-br from-purple-600 to-pink-700 hover:from-purple-500 hover:to-pink-600 active:scale-95 border border-purple-400/30 text-white' : 'bg-gradient-to-br from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 active:scale-95 border border-blue-400/30 text-white') : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'}`}>
                                        <Dices className="w-5 h-5" />
                                        <span className="font-bold text-xs uppercase hidden xl:inline">{me.inJail ? 'Tirar (Dobles)' : 'Tirar Dados'}</span>
                                    </button>
                                    <button className="p-2.5 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-md bg-slate-700/50 hover:bg-slate-700 border border-slate-600 group">
                                        <ArrowRightLeft className="w-4 h-4 text-orange-400 group-hover:rotate-180 transition-transform duration-500" />
                                        <span className="font-bold text-xs uppercase hidden xl:inline text-slate-300 group-hover:text-white">Trueque</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* MIDDLE SECTION: Balance */}
                        <div className="py-4 bg-transparent border-b border-slate-800/50 shadow-inner flex flex-col items-center justify-center relative">
                            <p className="text-slate-500 text-[9px] font-bold uppercase tracking-[0.3em] mb-1">Balance</p>
                            <div className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-green-500 tracking-tighter drop-shadow-lg flex items-baseline">
                                <span className="text-2xl mr-1 text-emerald-500/80">M</span>{me.balance}
                            </div>
                        </div>

                        {/* BOTTOM SECTION: Patrimonio y Mercado */}
                        <div className="flex-1 flex flex-col bg-slate-950 p-4 sm:p-6 overflow-hidden">
                            <div className="flex items-center gap-2 mb-4 bg-slate-900 rounded-xl p-1 border border-slate-800 shadow-inner">
                                <button onClick={() => setActiveTab('patrimonio')} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${activeTab === 'patrimonio' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}`}>
                                    <Building2 className="w-4 h-4" /> Patrimonio ({(me.properties || []).length})
                                </button>
                                <button onClick={() => setActiveTab('venta')} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${activeTab === 'venta' ? 'bg-green-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}`}>
                                    <Building2 className="w-4 h-4" /> En Venta
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4">
                                {activeTab === 'patrimonio' ? (
                                    ((!me.properties || me.properties.length === 0) && (!me.getOutJailFreeCards || me.getOutJailFreeCards === 0)) ? (
                                        <div className="h-full flex flex-col items-center justify-center opacity-50">
                                            <Building2 className="w-12 h-12 text-slate-700 mb-3" />
                                            <p className="text-slate-400 font-medium text-xs">Sin propiedades ni cartas</p>
                                        </div>
                                    ) : (
                                        <React.Fragment>
                                            {me.getOutJailFreeCards > 0 && (
                                                <div className="mb-4">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <div className="w-3 h-3 rounded-full border border-white/20 bg-yellow-500"></div>
                                                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cartas Especiales</span>
                                                        <div className="flex-1 h-px bg-slate-800"></div>
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                                        <div className="relative rounded-lg overflow-hidden shadow-lg border-2 border-yellow-400/50 bg-gradient-to-br from-yellow-100 to-orange-100 p-3 flex flex-col items-center justify-center text-center">
                                                            <span className="text-2xl drop-shadow-md mb-1">🗝️</span>
                                                            <p className="text-[7px] font-black uppercase tracking-[0.15em] text-orange-800 mb-0.5 leading-none">CARTA DE SUERTE / COMUNIDAD</p>
                                                            <h4 className="font-black text-orange-900 text-[10px] sm:text-xs leading-tight uppercase">Quedas libre de la cárcel</h4>
                                                            <div className="mt-2 bg-yellow-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full">
                                                                X {me.getOutJailFreeCards}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            {(() => {
                                        const typePriority = { station: 0, utility: 1, property: 2 };
                                        const propDatas = (me.properties || [])
                                            .map(id => boardSpaces.find(s => s.id === id))
                                            .filter(Boolean)
                                            .sort((a, b) => {
                                                const tp = (typePriority[a.type] ?? 3) - (typePriority[b.type] ?? 3);
                                                return tp !== 0 ? tp : a.id - b.id;
                                            });
                                        const groups = {};
                                        propDatas.forEach(p => {
                                            const key = p.type === 'property' ? (p.color || 'other') : p.type;
                                            if (!groups[key]) groups[key] = { label: p.type === 'station' ? '🚂 Estaciones' : p.type === 'utility' ? '⚡ Servicios' : null, colorHex: p.colorHex, items: [] };
                                            groups[key].items.push(p);
                                        });
                                        return Object.entries(groups).map(([key, group]) => (
                                            <div key={key}>
                                                <div className="flex items-center gap-2 mb-2">
                                                    {group.colorHex ? <div className="w-3 h-3 rounded-full border border-white/20" style={{backgroundColor: group.colorHex}}></div> : null}
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{group.label || group.items[0]?.name.split(' ')[0]}</span>
                                                    <div className="flex-1 h-px bg-slate-800"></div>
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                                    {group.items.map((propData, idx) => {
                                                        const isMort = me.mortgaged?.includes(propData.id) || false;
                                                        return (
                                                            <div key={idx} onClick={() => setSelectedSpacePC(propData)}
                                                                className="relative rounded-lg overflow-hidden cursor-pointer shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all border-2 border-white/20"
                                                                style={{ backgroundColor: propData.colorHex || (propData.type === 'station' ? '#374151' : '#4b5563') }}>
                                                                <div className="px-2 py-2 flex flex-col items-center justify-center text-center min-h-[52px]">
                                                                    <p className="text-[6px] font-black uppercase tracking-[0.15em] text-white/80 mb-0.5 leading-none">TÍTULO DE PROPIEDAD</p>
                                                                    <h4 className="font-black text-white text-[10px] sm:text-xs leading-tight uppercase">{propData.name}</h4>
                                                                </div>
                                                                {isMort && (
                                                                    <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center">
                                                                        <span className="text-red-400 font-black text-2xl leading-none">✕</span>
                                                                        <span className="text-red-400 font-black text-[8px] uppercase tracking-widest mt-0.5">Hipotecada</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ));
                                    })()}
                                        </React.Fragment>
                                    )
                                ) : (
                                    (() => {
                                        const ownedIds = new Set(gameState.players.flatMap(p => p.properties || []));
                                        const availableProps = boardSpaces.filter(s => (s.type === 'property' || s.type === 'station' || s.type === 'utility') && !ownedIds.has(s.id));
                                        
                                        if (availableProps.length === 0) {
                                            return (
                                                <div className="h-full flex flex-col items-center justify-center opacity-50">
                                                    <Building2 className="w-12 h-12 text-slate-700 mb-3" />
                                                    <p className="text-slate-400 font-medium text-xs">No hay propiedades en venta</p>
                                                </div>
                                            );
                                        }

                                        const typePriority = { station: 0, utility: 1, property: 2 };
                                        availableProps.sort((a, b) => {
                                            const tp = (typePriority[a.type] ?? 3) - (typePriority[b.type] ?? 3);
                                            return tp !== 0 ? tp : a.id - b.id;
                                        });

                                        const groups = {};
                                        availableProps.forEach(p => {
                                            const key = p.type === 'property' ? (p.color || 'other') : p.type;
                                            if (!groups[key]) groups[key] = { label: p.type === 'station' ? '🚂 Estaciones' : p.type === 'utility' ? '⚡ Servicios' : null, colorHex: p.colorHex, items: [] };
                                            groups[key].items.push(p);
                                        });

                                        return Object.entries(groups).map(([key, group]) => (
                                            <div key={key}>
                                                <div className="flex items-center gap-2 mb-2">
                                                    {group.colorHex ? <div className="w-3 h-3 rounded-full border border-white/20" style={{backgroundColor: group.colorHex}}></div> : null}
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{group.label || group.items[0]?.name.split(' ')[0]}</span>
                                                    <div className="flex-1 h-px bg-slate-800"></div>
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                                    {group.items.map((propData, idx) => (
                                                        <div key={idx} onClick={() => setSelectedSpacePC(propData)}
                                                            className="relative rounded-lg overflow-hidden cursor-pointer shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all border-2 border-white/20 flex flex-col"
                                                            style={{ backgroundColor: propData.colorHex || (propData.type === 'station' ? '#374151' : '#4b5563') }}>
                                                            <div className="px-2 pt-2 pb-1 flex flex-col items-center justify-center text-center flex-1">
                                                                <p className="text-[6px] font-black uppercase tracking-[0.15em] text-white/80 mb-0.5 leading-none">EN VENTA</p>
                                                                <h4 className="font-black text-white text-[10px] sm:text-xs leading-tight uppercase">{propData.name}</h4>
                                                            </div>
                                                            <div className="bg-black/30 w-full py-1 text-center border-t border-white/10">
                                                                <span className="text-[10px] font-black text-yellow-400">M{propData.price}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ));
                                    })()
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Renderizar la aplicación
        const root = createRoot(document.getElementById('root'));
        root.render(<PatopolyApp />);
    </script>
</body>
</html>
