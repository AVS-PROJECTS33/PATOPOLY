                                </div>
                            </div>
                        )}

                        {/* MODAL PARKING GRATUITO */}
                        {gameState.freeParkingClaim && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in zoom-in duration-300">
                                <div className="bg-slate-900 border border-blue-500/50 rounded-3xl shadow-[0_0_50px_rgba(59,130,246,0.3)] w-full max-w-sm p-8 flex flex-col items-center gap-6 text-center">
                                    <div className="text-7xl animate-bounce">🚗💨</div>
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 uppercase tracking-widest drop-shadow-sm mb-2">
                                            {gameState.freeParkingClaim.playerId === playerId ? '¡Felicidades!' : '¡Bote Entregado!'}
                                        </h1>
                                        <p className="text-slate-300 text-base">
                                            {gameState.freeParkingClaim.playerId === playerId ? 
                                                'Te has llevado el bote del parking gratuito.' : 
                                                <><strong className="text-white">{gameState.freeParkingClaim.playerName}</strong> se ha llevado el bote del parking gratuito.</>}
                                        </p>
                                    </div>
                                    <div className="bg-blue-500/10 rounded-2xl px-8 py-4 text-center border border-blue-500/30 w-full">
                                        <p className="text-5xl font-black text-blue-400">+M{gameState.freeParkingClaim.amount}</p>
                                    </div>
                                    {gameState.freeParkingClaim.playerId === playerId ? (
                                        <button onClick={handleClaimParking} className="w-full mt-2 px-8 py-4 rounded-xl bg-gradient-to-r from-blue-500 to-cyan-600 hover:from-blue-400 hover:to-cyan-500 text-white font-black text-lg transition border border-blue-400 shadow-lg uppercase active:scale-95">
                                            Aceptar
                                        </button>
                                    ) : (
                                        <p className="text-slate-400 text-sm mt-4 animate-pulse">Esperando a que acepte...</p>
                                    )}
                                </div>
                            </div>
                        )}
                        {/* MODAL COMPRA DE PROPIEDAD */}
                        {myPurchase && (() => {
                            const space = boardSpaces[myPurchase.spaceId];
                            const canAfford = me.balance >= space.price;
                            return (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                    <div className="bg-slate-900 border border-white/10 rounded-3xl shadow-2xl max-w-sm w-full p-6 flex flex-col items-center gap-5">
                                        <div className={`w-full h-3 rounded-t-xl ${space.color || 'bg-gray-400'}`}></div>
                                        <div className="flex justify-center"><TokenIcon tokenId={me.token} className="w-16 h-16" /></div>
                                        <h2 className="text-2xl font-black text-white text-center uppercase tracking-wider">{space.name}</h2>
                                        <p className="text-slate-400 text-sm text-center">Has caído en esta propiedad. ¿Deseas comprarla?</p>
                                        <div className="bg-slate-800 rounded-2xl px-8 py-4 text-center border border-slate-700">
                                            <p className="text-slate-400 text-xs uppercase font-bold tracking-widest mb-1">Precio</p>
                                            <p className="text-4xl font-black text-yellow-400">M{space.price}</p>
                                            {!canAfford && <p className="text-red-400 text-xs mt-1 font-bold">No tienes suficiente dinero</p>}
                                        </div>
                                        <div className="flex gap-3 w-full">
                                            <button onClick={() => handleBuyProperty(false)} className="flex-1 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-black text-lg transition border border-slate-600">Pasar</button>
                                            <button onClick={() => handleBuyProperty(true)} disabled={!canAfford} className={`flex-1 py-3 rounded-xl font-black text-lg transition ${canAfford ? 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white shadow-[0_0_20px_rgba(34,197,94,0.3)]' : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'}`}>Comprar</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* MODAL DE CARTA (SUERTE / COMUNIDAD) */}
                        {(() => {
                            const ac = gameState.activeCard;
                            if (!ac) return null;
                            const isMyTurnForCard = ac.playerId === playerId;
                            const deck = ac.type === 'chance' ? chanceCards : communityChestCards;
                            const card = deck.find(c => c.id === ac.cardId);
                            if (!card) return null;
                            let cardCost = 0;
                            if (card.action === 'payBank') cardCost = card.value;
                            else if (card.action === 'payPlayers') cardCost = card.value * (gameState.players.length - 1);
                            else if (card.action === 'repairs') cardCost = (me.properties ? me.properties.length : 0) * card.value;
                            
                            const canAfford = me.balance >= cardCost;
                            
                            return (
                                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                                    <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={() => {}} />
                                    <div className={`relative w-full max-w-sm rounded-3xl p-6 sm:p-8 flex flex-col items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-4 ${ac.type === 'chance' ? 'bg-orange-50 border-orange-500' : 'bg-blue-50 border-blue-500'}`}>
                                        <div className="text-6xl mb-4 drop-shadow-md">
                                            {ac.type === 'chance' ? '❓' : '🎁'}
                                        </div>
                                        <h2 className={`text-2xl font-black uppercase tracking-widest mb-6 ${ac.type === 'chance' ? 'text-orange-600' : 'text-blue-600'}`}>
                                            {ac.type === 'chance' ? 'Suerte' : 'Caja de Comunidad'}
                                        </h2>
                                        
                                        <div className="text-center bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-inner w-full mb-6">
                                            <p className="text-xl font-bold text-slate-800 leading-snug">
                                                {card.text}
                                            </p>
                                        </div>
                                        
                                        {isMyTurnForCard ? (
                                            canAfford ? (
                                                <button onClick={handleAcceptCard} className={`w-full py-4 rounded-xl font-black text-xl text-white shadow-lg transition active:scale-95 ${ac.type === 'chance' ? 'bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-400 hover:to-red-400' : 'bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500'}`}>
                                                    Aceptar
                                                </button>
                                            ) : (
                                                <div className="w-full text-center">
                                                    <button disabled className="w-full py-3 rounded-xl bg-slate-800 text-slate-500 font-black text-sm border border-slate-700 uppercase tracking-wider cursor-not-allowed">Fondos Insuficientes</button>
                                                    <p className="text-xs text-red-400 mt-2 font-bold animate-pulse">Vende casas, hipoteca o declara Bancarrota.</p>
                                                </div>
                                            )
                                        ) : (
                                            <div className="w-full py-4 rounded-xl bg-slate-200 text-slate-500 font-bold text-center border border-slate-300">
                                                Esperando a {gameState.players.find(p => p.id === ac.playerId)?.name}...
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })()}

                        {/* MODAL VAYA A LA CÁRCEL */}
                        {gameState.awaitingGoToJail && (
                            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                                <div className="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
                                <div className="relative w-full max-w-md rounded-3xl p-6 sm:p-8 flex flex-col items-center shadow-[0_20px_50px_rgba(239,68,68,0.3)] border-4 bg-slate-900 border-red-500 text-center">
                                    <div className="text-6xl mb-4 animate-bounce">🚔</div>
                                    <h2 className="text-3xl font-black uppercase tracking-widest mb-4 text-red-500 drop-shadow-md">Vas a la Cárcel</h2>
                                    
                                    <div className="bg-slate-800 p-6 rounded-2xl border-2 border-slate-700 shadow-inner w-full mb-6">
                                        <p className="text-lg font-bold text-slate-300 leading-snug">
                                            Debes ir directamente a la cárcel sin pasar por la salida y sin cobrar M200.
                                        </p>
                                        <p className="text-xl font-black text-white mt-4 bg-red-900/50 p-3 rounded-lg border border-red-500/30">
                                            Estarás 3 turnos sin tirar o hasta que pagues M50 o saques dobles.
                                        </p>
                                    </div>
                                    
                                    {gameState.awaitingGoToJail.playerId === playerId ? (
                                        <button onClick={handleAcceptGoToJail} className="w-full py-4 rounded-xl font-black text-xl text-white shadow-[0_0_15px_rgba(239,68,68,0.5)] transition active:scale-95 bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 border border-red-500">
                                            Aceptar y cumplir condena
                                        </button>
                                    ) : (
                                        <div className="w-full py-4 rounded-xl bg-slate-800 text-slate-400 font-bold text-center border border-slate-700 animate-pulse">
                                            Esperando a que {gameState.players.find(p => p.id === gameState.awaitingGoToJail.playerId)?.name} acepte su condena...
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* PANEL IZQUIERDO: TABLERO */}
                    <div className={`w-full lg:w-[70%] h-full p-2 lg:p-6 flex items-center justify-center border-b lg:border-b-0 lg:border-r border-slate-800/50 bg-slate-950/40 lg:overflow-hidden relative z-10 ${gameState.mode === 'family' ? 'hidden lg:flex' : ''}`}>
                        {/* TABLERO (Siempre renderizado para ejecutar la lógica de final de turno, aunque oculto por CSS) */}
                        <div className="w-full max-w-[95vmin] lg:max-w-[96vh] drop-shadow-2xl flex-shrink-0">
                            <Board gameState={gameState} onAnimationComplete={handleAnimationComplete} />
                        </div>
                    </div>

                    {/* PANEL DERECHO: CONTROLES DEL JUGADOR */}
                    <div className={`w-full ${gameState.mode === 'family' ? 'flex-1' : 'lg:w-[30%]'} flex flex-col h-full bg-slate-900 shadow-[-10px_0_30px_rgba(0,0,0,0.5)] relative z-20 overflow-hidden`}>
                        
                        {/* TOP SECTION: Jugador + Acciones */}
                        <div className="p-4 sm:p-5 bg-slate-800 border-b border-slate-700 shadow-md relative z-10 flex flex-col gap-4">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="bg-slate-900/50 w-12 h-12 rounded-full flex items-center justify-center border border-white/10 shadow-inner"><TokenIcon tokenId={me.token} className="w-8 h-8" /></div>
                                    <div>
                                        <h2 className="text-xl font-black text-white leading-tight truncate max-w-[150px]">{me.name}</h2>
                                        <div className="flex items-center gap-1.5 mt-0.5">
                                            <div className={`w-2 h-2 rounded-full ${isMyTurn ? 'bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-slate-600'}`}></div>
                                            <p className={`text-[10px] font-bold uppercase tracking-wider ${isMyTurn ? 'text-green-400' : 'text-slate-400'} truncate max-w-[150px]`}>
                                                {isMyTurn ? 'Tu turno' : `Turno de ${gameState.players[gameState.currentTurnIndex]?.name || '...'}`}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    {isMyTurn && me.inJail && (
                                        <>
                                        <button 
                                            onClick={handlePayJail}
                                            disabled={me.balance < 50 || gameState.isAnimating}
                                            className="p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md bg-gradient-to-br from-red-600 to-orange-700 hover:from-red-500 hover:to-orange-600 active:scale-95 border border-red-400/30">
                                            <span className="font-bold text-xs uppercase hidden xl:inline text-white">Pagar M50</span>
                                        </button>
                                        {me.getOutJailFreeCards > 0 && (
                                            <button 
                                                onClick={handleUseJailCard}
                                                disabled={gameState.isAnimating}
                                                className="p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md bg-gradient-to-br from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 active:scale-95 border border-yellow-400/30">
                                                <span className="font-bold text-xs uppercase hidden xl:inline text-white">Usar Carta</span>
                                            </button>
                                        )}
                                        </>
                                    )}
                                    {(() => {
                                        const isRollingAllowed = isMyTurn && !gameState.isAnimating && !gameState.awaitingPurchase && !gameState.awaitingTax && !gameState.activeCard && !gameState.awaitingRent && !gameState.freeParkingClaim && !gameState.awaitingUtilityRoll;
                                        return (
                                            <button 
                                                onClick={rollDice}
                                                disabled={!isRollingAllowed}
                                                className={`p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md ${isRollingAllowed ? (me.inJail ? 'bg-gradient-to-br from-purple-600 to-pink-700 hover:from-purple-500 hover:to-pink-600 active:scale-95 border border-purple-400/30 text-white' : 'bg-gradient-to-br from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 active:scale-95 border border-blue-400/30 text-white') : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'}`}>
                                                <Dices className="w-5 h-5" />
                                                <span className="font-bold text-xs uppercase hidden xl:inline">{me.inJail ? 'Tirar (Dobles)' : 'Tirar Dados'}</span>
                                            </button>
                                        );
                                    })()}
                                    <button onClick={() => setShowTradeSelector(true)} disabled={gameState.activeTrade !== undefined && gameState.activeTrade !== null} className={`p-2.5 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-md border group ${gameState.activeTrade ? 'bg-slate-800 text-slate-600 border-slate-700 cursor-not-allowed' : 'bg-slate-700/50 hover:bg-slate-700 border-slate-600'}`}>
                                        <ArrowRightLeft className={`w-4 h-4 transition-transform duration-500 ${gameState.activeTrade ? 'text-slate-600' : 'text-orange-400 group-hover:rotate-180'}`} />
                                        <span className={`font-bold text-xs uppercase hidden xl:inline ${gameState.activeTrade ? 'text-slate-600' : 'text-slate-300 group-hover:text-white'}`}>Trueque</span>
                                    </button>
                                </div>
                            </div>
                            {me.balance <= 0 && (
                                <div className="mt-2 pt-2 border-t border-slate-700">
                                    <button onClick={() => setShowBankruptcyConfirm(true)} className="w-full bg-red-600 hover:bg-red-500 text-white font-black py-2 rounded-lg text-xs uppercase animate-pulse border border-red-400 shadow-lg shadow-red-900/50">Declarar Bancarrota</button>
                                </div>
                            )}
                        </div>

                        {/* MIDDLE SECTION: Balance */}
                        <div className="py-4 bg-transparent border-b border-slate-800/50 shadow-inner flex flex-col items-center justify-center relative overflow-hidden">
                            <p className="text-slate-500 text-[9px] font-bold uppercase tracking-[0.3em] mb-1">Balance</p>
                            <div className="flex items-center gap-4 relative w-full justify-center">
                                <div className={`text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r tracking-tighter drop-shadow-lg flex items-baseline relative z-10 ${me.balance < 0 ? 'from-red-400 to-red-600' : 'from-emerald-400 to-green-500'}`}>
                                    <span className={`text-2xl mr-1 ${me.balance < 0 ? 'text-red-500/80' : 'text-emerald-500/80'}`}>M</span>{me.balance}
                                </div>
                                {balanceDiff !== null && (
                                    <div className={`text-2xl font-black absolute right-4 sm:right-8 animate-fade-in-up z-20 ${balanceDiff > 0 ? 'text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]' : 'text-red-400 drop-shadow-[0_0_10px_rgba(248,113,113,0.5)]'}`}>
                                        {balanceDiff > 0 ? `+${balanceDiff}` : balanceDiff}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* BOTTOM SECTION: Patrimonio y Mercado */}
                        <div className="flex-1 flex flex-col bg-slate-950 p-4 sm:p-6 overflow-hidden">
                            <div className="flex items-center gap-2 mb-4 bg-slate-900 rounded-xl p-1 border border-slate-800 shadow-inner">
                                <button onClick={() => setActiveTab('patrimonio')} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${activeTab === 'patrimonio' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}`}>
                                    <Building2 className="w-4 h-4" /> Patrimonio ({(me.properties || []).length})
                                </button>
                                <button onClick={() => setActiveTab('venta')} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-all ${activeTab === 'venta' ? 'bg-green-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}`}>
                                    <Building2 className="w-4 h-4" /> En Venta
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4">
                                {activeTab === 'patrimonio' ? (
                                    ((!me.properties || me.properties.length === 0) && (!me.getOutJailFreeCards || me.getOutJailFreeCards === 0)) ? (
                                        <div className="h-full flex flex-col items-center justify-center opacity-50">
                                            <Building2 className="w-12 h-12 text-slate-700 mb-3" />
                                            <p className="text-slate-400 font-medium text-xs">Sin propiedades ni cartas</p>
                                        </div>
                                    ) : (
                                        <React.Fragment>
                                            {me.getOutJailFreeCards > 0 && (
                                                <div className="mb-4">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <div className="w-3 h-3 rounded-full border border-white/20 bg-yellow-500"></div>
                                                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cartas Especiales</span>
                                                        <div className="flex-1 h-px bg-slate-800"></div>
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                                        <div className="relative rounded-lg overflow-hidden shadow-lg border-2 border-yellow-400/50 bg-gradient-to-br from-yellow-100 to-orange-100 p-3 flex flex-col items-center justify-center text-center">
                                                            <span className="text-2xl drop-shadow-md mb-1">🗝️</span>
                                                            <p className="text-[7px] font-black uppercase tracking-[0.15em] text-orange-800 mb-0.5 leading-none">CARTA DE SUERTE / COMUNIDAD</p>
                                                            <h4 className="font-black text-orange-900 text-[10px] sm:text-xs leading-tight uppercase">Quedas libre de la cárcel</h4>
                                                            <div className="mt-2 bg-yellow-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full">
                                                                X {me.getOutJailFreeCards}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            {(() => {
                                        const typePriority = { station: 0, utility: 1, property: 2 };
                                        const propDatas = (me.properties || [])
                                            .map(id => boardSpaces.find(s => s.id === id))
                                            .filter(Boolean)
                                            .sort((a, b) => {
                                                const tp = (typePriority[a.type] ?? 3) - (typePriority[b.type] ?? 3);
                                                return tp !== 0 ? tp : a.id - b.id;
                                            });
                                        const groups = {};
                                        propDatas.forEach(p => {
                                            const key = p.type === 'property' ? (p.color || 'other') : p.type;
                                            if (!groups[key]) groups[key] = { label: p.type === 'station' ? '🚂 Estaciones' : p.type === 'utility' ? '⚡ Servicios' : null, colorHex: p.colorHex, items: [] };
                                            groups[key].items.push(p);
                                        });
                                        return Object.entries(groups).map(([key, group]) => (
                                            <div key={key}>
                                                <div className="flex items-center gap-2 mb-2">
                                                    {group.colorHex ? <div className="w-3 h-3 rounded-full border border-white/20" style={{backgroundColor: group.colorHex}}></div> : null}
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{group.label || group.items[0]?.name.split(' ')[0]}</span>
                                                    <div className="flex-1 h-px bg-slate-800"></div>
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                                    {group.items.map((propData, idx) => {
                                                        const isMort = me.mortgaged?.includes(propData.id) || false;
                                                        return (
                                                            <div key={idx} onClick={() => setSelectedSpacePC(propData)}
                                                                className="relative rounded-lg overflow-hidden cursor-pointer shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all border-2 border-white/20"
                                                                style={{ backgroundColor: propData.colorHex || (propData.type === 'station' ? '#374151' : '#4b5563') }}>
                                                                <div className="px-2 py-2 flex flex-col items-center justify-center text-center min-h-[52px]">
                                                                    <p className="text-[6px] font-black uppercase tracking-[0.15em] text-white/80 mb-0.5 leading-none">TÍTULO DE PROPIEDAD</p>
                                                                    <h4 className="font-black text-white text-[10px] sm:text-xs leading-tight uppercase">{propData.name}</h4>
                                                                </div>
                                                                {isMort && (
                                                                    <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center">
                                                                        <span className="text-red-400 font-black text-2xl leading-none">✕</span>
                                                                        <span className="text-red-400 font-black text-[8px] uppercase tracking-widest mt-0.5">Hipotecada</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ));
                                    })()}
                                        </React.Fragment>
                                    )
                                ) : (
                                    (() => {
                                        const ownedIds = new Set(gameState.players.flatMap(p => p.properties || []));
                                        const availableProps = boardSpaces.filter(s => (s.type === 'property' || s.type === 'station' || s.type === 'utility') && !ownedIds.has(s.id));
                                        
                                        if (availableProps.length === 0) {
                                            return (
                                                <div className="h-full flex flex-col items-center justify-center opacity-50">
                                                    <Building2 className="w-12 h-12 text-slate-700 mb-3" />
                                                    <p className="text-slate-400 font-medium text-xs">No hay propiedades en venta</p>
                                                </div>
                                            );
                                        }

                                        const typePriority = { station: 0, utility: 1, property: 2 };
                                        availableProps.sort((a, b) => {
                                            const tp = (typePriority[a.type] ?? 3) - (typePriority[b.type] ?? 3);
                                            return tp !== 0 ? tp : a.id - b.id;
                                        });

                                        const groups = {};
                                        availableProps.forEach(p => {
                                            const key = p.type === 'property' ? (p.color || 'other') : p.type;
                                            if (!groups[key]) groups[key] = { label: p.type === 'station' ? '🚂 Estaciones' : p.type === 'utility' ? '⚡ Servicios' : null, colorHex: p.colorHex, items: [] };
                                            groups[key].items.push(p);
                                        });

                                        return Object.entries(groups).map(([key, group]) => (
                                            <div key={key}>
                                                <div className="flex items-center gap-2 mb-2">
                                                    {group.colorHex ? <div className="w-3 h-3 rounded-full border border-white/20" style={{backgroundColor: group.colorHex}}></div> : null}
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{group.label || group.items[0]?.name.split(' ')[0]}</span>
                                                    <div className="flex-1 h-px bg-slate-800"></div>
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                                    {group.items.map((propData, idx) => (
                                                        <div key={idx} onClick={() => setSelectedSpacePC(propData)}
                                                            className="relative rounded-lg overflow-hidden cursor-pointer shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all border-2 border-white/20 flex flex-col"
                                                            style={{ backgroundColor: propData.colorHex || (propData.type === 'station' ? '#374151' : '#4b5563') }}>
                                                            <div className="px-2 pt-2 pb-1 flex flex-col items-center justify-center text-center flex-1">
                                                                <p className="text-[6px] font-black uppercase tracking-[0.15em] text-white/80 mb-0.5 leading-none">EN VENTA</p>
                                                                <h4 className="font-black text-white text-[10px] sm:text-xs leading-tight uppercase">{propData.name}</h4>
                                                            </div>
                                                            <div className="bg-black/30 w-full py-1 text-center border-t border-white/10">
                                                                <span className="text-[10px] font-black text-yellow-400">M{propData.price}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ));
                                    })()
                                )}
                            </div>

                            {/* MODAL DE CONFIRMACIÓN DE BANCARROTA */}
                            {showBankruptcyConfirm && (
                                <div className="fixed inset-0 z-[300] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in zoom-in duration-300">
                                    <div className="bg-slate-900 border border-red-500/50 p-8 rounded-3xl shadow-[0_0_50px_rgba(239,68,68,0.3)] w-full max-w-sm text-center flex flex-col items-center">
                                        <div className="text-6xl mb-4 animate-bounce">💀</div>
                                        <h2 className="text-2xl font-black text-red-500 uppercase tracking-widest mb-4 drop-shadow-md">¿Estás seguro?</h2>
                                        <p className="text-slate-300 text-sm mb-8">Al declarar la bancarrota quedarás <strong className="text-red-400">eliminado</strong> de la partida. Todas tus propiedades, casas y hoteles volverán al banco y podrán ser compradas por otros jugadores. Esta acción no se puede deshacer.</p>
                                        <div className="flex gap-4 w-full">
                                            <button onClick={() => setShowBankruptcyConfirm(false)} className="flex-1 bg-slate-800 text-white font-black py-4 rounded-xl border border-slate-600 hover:bg-slate-700 transition uppercase active:scale-95">Cancelar</button>
                                            <button onClick={handleBankruptcy} className="flex-1 bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-black py-4 rounded-xl shadow-[0_0_15px_rgba(239,68,68,0.5)] transition uppercase active:scale-95 border border-red-500">Confirmar</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        // Renderizar la aplicación
        const root = createRoot(document.getElementById('root'));
        root.render(<PatopolyApp />);
    </script>
</body>
</html>
