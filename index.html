        // 2. Configuración de Firebase (Tu base de datos real)
        const firebaseConfig = {

            authDomain: "patopoly.firebaseapp.com",
            projectId: "patopoly",
            storageBucket: "patopoly.firebasestorage.app",
            messagingSenderId: "868038756148",

        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "patopoly-app";

        // --- DATOS DEL TABLERO ---
        const boardSpaces = [
            { id: 0, name: "SALIDA", type: "corner", bg: "bg-red-100" },
            { id: 1, name: "Letamendi", type: "property", color: "bg-amber-800", price: 60 },
            { id: 2, name: "Caja de Comunidad", type: "community", bg: "bg-blue-50" },

            { id: 17, name: "Caja de Comunidad", type: "community", bg: "bg-blue-50" },
            { id: 18, name: "Pta. del Ángel", type: "property", color: "bg-orange-500", price: 180 },
            { id: 19, name: "Las Ramblas", type: "property", color: "bg-orange-500", price: 200 },
            { id: 20, name: "PARKING", type: "corner", bg: "bg-blue-100" },
            { id: 21, name: "Av. Diagonal", type: "property", color: "bg-red-500", price: 220 },
            { id: 22, name: "Suerte", type: "chance", bg: "bg-orange-50" },
            { id: 23, name: "P. de Gracia", type: "property", color: "bg-red-500", price: 220 },
            { id: 24, name: "Rambla Cataluña", type: "property", color: "bg-red-500", price: 240 },

            { id: 26, name: "Plaza España", type: "property", color: "bg-yellow-400", price: 260 },
            { id: 27, name: "Gran Vía", type: "property", color: "bg-yellow-400", price: 260 },

            { id: 31, name: "Pedralbes", type: "property", color: "bg-green-500", price: 300 },
            { id: 32, name: "Sarrià", type: "property", color: "bg-green-500", price: 300 },
            { id: 33, name: "Caja de Comunidad", type: "community", bg: "bg-blue-50" },
            { id: 34, name: "Sant Gervasi", type: "property", color: "bg-green-500", price: 320 },
            { id: 35, name: "Est. Sagrera", type: "station", price: 200, bg: "bg-gray-100" },
            { id: 36, name: "Suerte", type: "chance", bg: "bg-orange-50" },
            { id: 37, name: "Tibidabo", type: "property", color: "bg-blue-800", price: 350 },
            { id: 38, name: "Impuesto Lujo", type: "tax", price: 100, bg: "bg-gray-200" },
            { id: 39, name: "Parque Güell", type: "property", color: "bg-blue-800", price: 400 },
        ];

        const availableTokens = ['🚗', '🎩', '🚢', '🐕', '👟', '🐧'];
        const BACKGROUND_URL = "https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_eknq59eknq59eknq.png";

        // --- COMPONENTE PRINCIPAL ---
        function PatopolyApp() {
            const [user, setUser] = useState(null);
            const [isPlayerView, setIsPlayerView] = useState(false);
            const [gameId, setGameId] = useState('');
            const [playerId, setPlayerId] = useState('');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlGameId = params.get('gameId');
                const urlRole = params.get('role');

                if (urlGameId && urlRole === 'player') {
                    setIsPlayerView(true);
                    setGameId(urlGameId);
                }

                signInAnonymously(auth).catch(console.error);
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            if (!user) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Conectando...</div>;

            return (
                <div className="min-h-screen font-sans selection:bg-green-300">
                    {isPlayerView ? <PlayerController gameId={gameId} user={user} playerId={playerId} setPlayerId={setPlayerId} /> : <TVBoard user={user} />}
                </div>
            );
        }

        // --- COMPONENTE: TABLERO COMPARTIDO ---
        function Board({ gameState }) {
            const playersOnBoard = gameState?.players?.filter(p => p.hasJoined) || [];

            return (
                <div className="w-full max-w-[90vh] aspect-square bg-white border-2 border-slate-800 shadow-2xl relative mx-auto"
                style={{ display: 'grid', gridTemplateColumns: 'repeat(11, 1fr)', gridTemplateRows: 'repeat(11, 1fr)' }} >
                {boardSpaces.map((space, index) => {
                    let gridCol, gridRow, borderClasses = "", innerClasses = "flex flex-col items-center justify-between text-center p-0.5 sm:p-1 text-[0.45rem] sm:text-[10px] md:text-xs font-semibold overflow-hidden relative";
                    
                    if (index >= 0 && index <= 10) {
                        gridRow = 11; gridCol = 11 - index; borderClasses = "border-t border-r border-slate-800";
                        if(index === 0 || index === 10) innerClasses += " p-1 sm:p-2";
                    } else if (index >= 11 && index <= 19) {
                        gridCol = 1; gridRow = 11 - (index - 10); borderClasses = "border-t border-r border-slate-800";
                        innerClasses = innerClasses.replace('flex-col', 'flex-row-reverse');
                    } else if (index >= 20 && index <= 30) {
                        gridRow = 1; gridCol = index - 19; borderClasses = "border-b border-r border-slate-800";
                        innerClasses = innerClasses.replace('flex-col', 'flex-col-reverse');
                        if(index === 20 || index === 30) innerClasses = innerClasses.replace('flex-col-reverse', 'flex-col p-1 sm:p-2');
                    } else if (index >= 31 && index <= 39) {
                        gridCol = 11; gridRow = index - 29; borderClasses = "border-b border-l border-slate-800";
                        innerClasses = innerClasses.replace('flex-col', 'flex-row');
                    }

                    const occupants = playersOnBoard.filter(p => p.position === index);
                    
                    // BUSCAMOS SI LA CASILLA TIENE DUEÑO
                    const owner = gameState?.players?.find(p => p.properties?.includes(space.id));

                    return (
                        <div key={index} className={`box-border ${borderClasses}`} style={{ gridColumn: gridCol, gridRow: gridRow }}>
                            <div className={`w-full h-full ${space.bg || 'bg-white'} ${innerClasses}`}>
                                {space.type === 'property' && (
                                    <div className={`absolute ${index > 10 && index < 20 ? 'right-0 top-0 bottom-0 w-2 sm:w-3' : index > 30 ? 'left-0 top-0 bottom-0 w-2 sm:w-3' : index > 20 && index < 30 ? 'bottom-0 left-0 right-0 h-2 sm:h-3' : 'top-0 left-0 right-0 h-2 sm:h-3'} ${space.color} border-slate-800 ${index > 10 && index < 20 ? 'border-l' : index > 30 ? 'border-r' : index > 20 && index < 30 ? 'border-t' : 'border-b'}`}></div>
                                )}
                                
                                <div className={`z-10 w-full flex-1 flex flex-col items-center justify-center uppercase ${space.type === 'corner' ? 'text-xs sm:text-base font-black' : 'leading-tight px-0.5'}`}>
                                    
                                    {/* ICONOS DE LAS 4 ESQUINAS */}
                                    {space.id === 0 && <ArrowRight className="w-5 h-5 sm:w-8 sm:h-8 text-red-600 mb-0.5" />}
                                    {space.id === 10 && <Lock className="w-5 h-5 sm:w-8 sm:h-8 text-orange-600 mb-0.5" />}
                                    {space.id === 20 && <Car className="w-5 h-5 sm:w-8 sm:h-8 text-blue-600 mb-0.5" />}
                                    {space.id === 30 && <Siren className="w-5 h-5 sm:w-8 sm:h-8 text-red-600 mb-0.5 animate-pulse" />}
                                    
                                    <span className="text-center">{space.name}</span>

                                    {/* ETIQUETA "EN VENTA" O NOMBRE DEL DUEÑO */}
                                    {(space.type === 'property' || space.type === 'station' || space.type === 'utility') && (
                                        <div className={`mt-0.5 text-[5px] sm:text-[7px] px-1 py-[1px] rounded shadow-sm font-bold tracking-wide w-[90%] truncate text-center ${owner ? 'bg-slate-800 text-white' : 'bg-green-100 text-green-700 border border-green-300'}`}>
                                            {owner ? owner.name : 'EN VENTA'}
                                        </div>
                                    )}
                                </div>

                                {space.price > 0 && <div className="z-10 font-bold mb-0.5 opacity-70 scale-90">M{space.price}</div>}
                                
                                {occupants.length > 0 && (
                                    <div className="absolute inset-0 flex items-center justify-center flex-wrap gap-0.5 bg-black/10 z-20 pointer-events-none">
                                        {occupants.map((p, i) => <span key={i} className="text-sm sm:text-xl drop-shadow-md">{p.token}</span>)}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}

                <div className="bg-[#cde6d0] border border-slate-800 shadow-inner flex flex-col items-center justify-center relative p-4 sm:p-8" style={{ gridColumn: '2 / 11', gridRow: '2 / 11' }}>
                    <div className="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                    <div className="rotate-[-45deg] text-center">
                        <h1 className="text-4xl sm:text-7xl font-black text-red-600 drop-shadow-sm uppercase tracking-tighter border-4 sm:border-8 border-red-600 p-2 sm:p-4 bg-white">
                            PATOPOLY
                        </h1>
                        <h2 className="text-sm sm:text-2xl font-bold mt-2 text-slate-800 uppercase tracking-widest bg-white inline-block px-2 sm:px-4 py-1 border-2 border-slate-800">
                            Barcelona
                        </h2>
                    </div>
                </div>
                </div>
            );
        }

        // --- HOST / TV VIEW ---
        function TVBoard({ user }) {
            const [gameState, setGameState] = useState(null);
            const [setupMode, setSetupMode] = useState(''); // '', 'online', 'family'
            const [setupStep, setSetupStep] = useState(0); 
            const [playerCount, setPlayerCount] = useState(2);
            const [playerNames, setPlayerNames] = useState(['', '']);
            const [activeGameId, setActiveGameId] = useState(null);
            const [copied, setCopied] = useState(false);
            const [fbError, setFbError] = useState(false);

            useEffect(() => {
                if (!user || !activeGameId) return;
                const gameRef = doc(db, 'artifacts', appId, 'games', activeGameId);
                const unsubscribe = onSnapshot(gameRef, (docSnap) => {
                    if (docSnap.exists()) setGameState(docSnap.data());
                }, (error) => {
                    console.error("Error sincronizando:", error);
                    setFbError(true);
                });
                return () => unsubscribe();
            }, [user, activeGameId]);

            const handleCreateGame = async () => {
                const newGameId = `patopoly_${Math.random().toString(36).substring(2, 8)}`;
                const initialPlayers = playerNames.map((name, index) => ({
                    id: `p${index}`, name: name || `Jugador ${index + 1}`, token: null, balance: 1500, position: 0, properties: [], hasJoined: false
                }));

                const newGameState = {
                    status: 'waiting_for_players',
                    mode: setupMode,
                    players: initialPlayers,
                    currentTurnIndex: 0,
                    logs: ['Sala creada. ¡Esperando a los jugadores!']
                };

                try {
                    const gameRef = doc(db, 'artifacts', appId, 'games', newGameId);
                    await setDoc(gameRef, newGameState);
                    setActiveGameId(newGameId);
                } catch (error) {
                    console.error("Firebase Error:", error);
                    setFbError(true);
                }
            };

            const copyJoinUrl = () => {
                const url = new URL(window.location.href);
                url.searchParams.set('gameId', activeGameId);
                url.searchParams.set('role', 'player');
                navigator.clipboard.writeText(url.toString());
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            // Menú de Inicio
            if (!activeGameId || !gameState) {
                return (
                    <div className="min-h-screen bg-slate-900 bg-cover bg-center flex items-center justify-center p-8" style={{ backgroundImage: `url(${BACKGROUND_URL})` }}>
                        <div className="glass-panel rounded-3xl shadow-2xl p-8 max-w-lg w-full text-center text-white border border-white/10">
                            <h1 className="text-5xl font-black mb-1 tracking-wider text-transparent bg-clip-text bg-gradient-to-br from-red-400 to-red-600 drop-shadow-lg">PATOPOLY</h1>
                            <p className="text-slate-300 uppercase tracking-[0.3em] text-sm mb-10">La ciudad es tuya</p>

                            {fbError && (
                                <div className="bg-red-500/90 text-white p-4 rounded-xl mb-6 text-sm font-bold border border-red-400 text-left">
                                    ⚠️ ERROR DE PERMISOS: Tienes que ir a Firebase &gt; Firestore Database &gt; Reglas. Borra todo y pega:<br/><br/>
                                    <code className="bg-black/30 p-2 block rounded font-mono text-xs mt-2">rules_version = '2';<br/>service cloud.firestore &#123;<br/>&nbsp;&nbsp;match /databases/&#123;database&#125;/documents &#123;<br/>&nbsp;&nbsp;&nbsp;&nbsp;match /&#123;document=**&#125; &#123;<br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read, write: if true;<br/>&nbsp;&nbsp;&nbsp;&nbsp;&#125;<br/>&nbsp;&nbsp;&#125;<br/>&#125;</code>
                                </div>
                            )}

                            {setupMode === '' && (
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setSetupMode('online')} className="group glass-panel hover:bg-slate-800/80 p-6 rounded-2xl transition transform hover:scale-105 flex flex-col items-center">
                                        <Globe2 className="w-12 h-12 text-blue-400 mb-3 group-hover:text-blue-300" />
                                        <h3 className="font-bold text-lg">Modo Online</h3>
                                        <p className="text-xs text-slate-400 mt-2">Cada jugador en su pantalla</p>
                                    </button>
                                    <button disabled className="group glass-panel opacity-50 p-6 rounded-2xl flex flex-col items-center relative overflow-hidden">
                                        <Users className="w-12 h-12 text-green-400 mb-3" />
                                        <h3 className="font-bold text-lg">Modo Familia</h3>
                                        <p className="text-xs text-slate-400 mt-2">Próximamente</p>
                                        <div className="absolute top-3 right-[-30px] bg-red-500 text-[10px] font-black uppercase px-10 py-1 rotate-45">WIP</div>
                                    </button>
                                </div>
                            )}

                            {setupMode === 'online' && setupStep === 0 && (
                                <div className="space-y-6 animate-fade-in">
                                    <p className="text-slate-300">¿Cuántos inversores van a jugar hoy?</p>
                                    <div className="flex justify-center items-center space-x-6">
                                        <button onClick={() => setPlayerCount(Math.max(2, playerCount - 1))} className="w-12 h-12 rounded-full glass-panel hover:bg-white/10 text-2xl font-bold transition">-</button>
                                        <span className="text-4xl font-black">{playerCount}</span>
                                        <button onClick={() => setPlayerCount(Math.min(6, playerCount + 1))} className="w-12 h-12 rounded-full glass-panel hover:bg-white/10 text-2xl font-bold transition">+</button>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setSetupMode('')} className="w-1/3 glass-panel hover:bg-white/10 font-bold py-4 rounded-xl transition">Atrás</button>
                                        <button onClick={() => { setPlayerNames(Array(playerCount).fill('')); setSetupStep(1); }} className="w-2/3 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 font-bold py-4 rounded-xl shadow-lg transition">Siguiente</button>
                                    </div>
                                </div>
                            )}

                            {setupMode === 'online' && setupStep === 1 && (
                                <div className="space-y-4 animate-fade-in">
                                    <p className="text-slate-300">Configura los nombres</p>
                                    {playerNames.map((name, i) => (
                                        <input key={i} type="text" placeholder={`Nombre Jugador ${i + 1}`} value={name} onChange={(e) => { const newNames = [...playerNames]; newNames[i] = e.target.value; setPlayerNames(newNames); }} className="w-full p-4 glass-panel border border-white/20 rounded-xl focus:border-blue-400 focus:ring-0 outline-none text-lg text-white placeholder-slate-500" />
                                    ))}
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setSetupStep(0)} className="w-1/3 glass-panel hover:bg-white/10 font-bold py-4 rounded-xl transition">Atrás</button>
                                        <button onClick={handleCreateGame} className="w-2/3 bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 font-bold py-4 rounded-xl shadow-lg transition">¡Crear Sala!</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Sala de Espera (Lobby)
            const allJoined = gameState.players.every(p => p.hasJoined);
            
            if (!allJoined) {
                return (
                    <div className="min-h-screen bg-slate-900 bg-cover bg-center flex items-center justify-center p-8" style={{ backgroundImage: `url(${BACKGROUND_URL})` }}>
                        <div className="glass-panel rounded-3xl p-8 max-w-md w-full text-center text-white shadow-2xl">
                            <h2 className="text-3xl font-black uppercase mb-2">Sala Creada</h2>
                            <p className="text-slate-300 mb-8">Envía este enlace a los demás jugadores para que se unan.</p>
                            
                            <button onClick={copyJoinUrl} className={`w-full flex items-center justify-center gap-3 p-4 rounded-xl font-bold text-lg transition-all duration-300 ${copied ? 'bg-green-500 text-white shadow-lg shadow-green-500/30' : 'bg-white text-slate-900 hover:bg-slate-100 shadow-xl'}`}>
                                {copied ? <CheckCircle2 className="w-6 h-6" /> : <Copy className="w-6 h-6" />}
                                {copied ? '¡Enlace Copiado!' : 'Copiar Enlace de Invitación'}
                            </button>

                            <div className="mt-8 text-left glass-panel rounded-xl p-4">
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 text-center">Jugadores ({gameState.players.filter(p=>p.hasJoined).length}/{gameState.players.length})</p>
                                <div className="flex flex-col gap-2">
                                    {gameState.players.map((p, i) => (
                                        <div key={i} className="flex justify-between items-center bg-white/5 px-4 py-2 rounded-lg">
                                            <span className="font-medium text-slate-200">{p.name}</span>
                                            {p.hasJoined ? <span className="text-green-400 font-bold bg-green-400/10 px-2 py-1 rounded flex items-center gap-2">{p.token} Listo</span> : <span className="text-slate-500 italic text-sm">Esperando...</span>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Si todos están listos, muestra el tablero central (modo host)
            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <Board gameState={gameState} />
                </div>
            );
        }

        // --- PLAYER CONTROLLER (ONLINE VIEW) ---
        function PlayerController({ gameId, user, playerId, setPlayerId }) {
            const [gameState, setGameState] = useState(null);
            const [selectedToken, setSelectedToken] = useState('');
            
            useEffect(() => {
                if (!user || !gameId) return;
                const gameRef = doc(db, 'artifacts', appId, 'games', gameId);
                const unsubscribe = onSnapshot(gameRef, (docSnap) => {
                    if (docSnap.exists()) setGameState(docSnap.data());
                });
                return () => unsubscribe();
            }, [user, gameId]);

            const handleJoin = async (targetPlayerId) => {
                if (!selectedToken) return;
                const updatedPlayers = gameState.players.map(p => p.id === targetPlayerId ? { ...p, hasJoined: true, token: selectedToken } : p);
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { 
                        players: updatedPlayers,
                        logs: [...gameState.logs, `¡${gameState.players.find(p=>p.id===targetPlayerId).name} se ha unido con ${selectedToken}!`]
                    });
                    setPlayerId(targetPlayerId);
                } catch (error) { console.error(error); }
            };

            const rollDice = async () => {
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return; // No es tu turno
                
                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                const totalMove = d1 + d2;
                
                const me = gameState.players.find(p => p.id === playerId);
                let newPos = me.position + totalMove;
                let newBalance = me.balance;
                let passedGo = false;

                if (newPos >= 40) {
                    newPos = newPos % 40;
                    newBalance += 200; // Pasó por la Salida
                    passedGo = true;
                }

                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, position: newPos, balance: newBalance };
                    }
                    return p;
                });

                // Next turn logic (simplified: no doubles logic yet)
                let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;

                let logMsg = `${me.name} tiró ${d1} y ${d2} (${totalMove}) y cayó en ${boardSpaces[newPos].name}.`;
                if(passedGo) logMsg += " ¡Cobró M200 por pasar por la Salida!";

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        currentTurnIndex: nextTurn,
                        logs: [...gameState.logs, logMsg]
                    });
                } catch(e) { console.error(e); }
            };

            if (!gameState) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Cargando sala...</div>;

            const me = gameState.players.find(p => p.id === playerId);

            // PANTALLA DE SELECCIÓN DE FICHA
            if (!me) {
                const availablePlayers = gameState.players.filter(p => !p.hasJoined);
                const takenTokens = gameState.players.filter(p => p.hasJoined).map(p => p.token);
                
                if (availablePlayers.length === 0) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-red-500 font-bold">Sala llena</div>;

                return (
                    <div className="min-h-screen bg-slate-900 bg-cover bg-center flex flex-col items-center p-6" style={{ backgroundImage: `url(${BACKGROUND_URL})` }}>
                        <div className="glass-panel w-full max-w-md rounded-3xl p-6 shadow-2xl border border-white/10 mt-10">
                            <h1 className="text-3xl font-black text-center text-white mb-8">Unirse a la Partida</h1>
                            
                            <h2 className="font-bold text-slate-300 mb-4">1. ¿Quién eres?</h2>
                            <div className="space-y-3 mb-8">
                                {availablePlayers.map(p => (
                                    <button key={p.id} onClick={() => setPlayerId(p.id)} className={`w-full text-left p-4 rounded-xl border-2 font-medium transition flex items-center ${playerId === p.id ? 'border-blue-500 bg-blue-500/20 text-white' : 'border-slate-700 bg-slate-800/50 text-slate-300 hover:border-slate-500'}`}>
                                        <UserCircle2 className="w-5 h-5 mr-3 opacity-70" /> {p.name}
                                    </button>
                                ))}
                            </div>

                            {playerId && (
                                <div className="animate-fade-in">
                                    <h2 className="font-bold text-slate-300 mb-4">2. Elige tu ficha</h2>
                                    <div className="grid grid-cols-3 gap-3 mb-8">
                                        {availableTokens.map(token => {
                                            const isTaken = takenTokens.includes(token);
                                            return (
                                                <button key={token} disabled={isTaken} onClick={() => setSelectedToken(token)} className={`text-4xl p-4 rounded-xl border-2 transition ${isTaken ? 'opacity-20 cursor-not-allowed border-slate-800' : selectedToken === token ? 'border-green-500 bg-green-500/20' : 'border-slate-700 bg-slate-800/50 hover:border-slate-500'}`}>
                                                    {token}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => handleJoin(playerId)} disabled={!selectedToken} className="w-full bg-gradient-to-r from-green-500 to-green-600 disabled:opacity-50 text-white font-black py-4 rounded-xl shadow-lg transition text-lg uppercase tracking-wide">Entrar al Juego</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // PANTALLA PRINCIPAL DE JUGADOR (TABLERO + CONTROLES)
            const isMyTurn = gameState.players[gameState.currentTurnIndex].id === playerId;

            return (
                <div className="min-h-screen bg-slate-900 flex flex-col md:flex-row pb-safe text-white">
                    {/* PANEL IZQUIERDO: TABLERO */}
                    <div className="w-full md:w-[60%] lg:w-[70%] p-4 md:p-8 flex items-center justify-center border-b md:border-b-0 md:border-r border-slate-800 bg-slate-950">
                        <Board gameState={gameState} />
                    </div>

                    {/* PANEL DERECHO: CONTROLES DEL JUGADOR */}
                    <div className="w-full md:w-[40%] lg:w-[30%] flex flex-col h-full bg-slate-900 overflow-y-auto">
                        <div className="p-6 bg-slate-800 border-b border-slate-700 shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10"><UserCircle2 className="w-32 h-32" /></div>
                            <div className="flex justify-between items-center mb-6 relative z-10">
                                <div>
                                    <h2 className="text-2xl font-black">{me.name}</h2>
                                    <p className={`text-sm font-bold ${isMyTurn ? 'text-green-400' : 'text-slate-400'}`}>{isMyTurn ? '¡Es tu turno!' : 'Esperando...'}</p>
                                </div>
                                <div className="text-6xl drop-shadow-md">{me.token}</div>
                            </div>
                            <div className="bg-slate-900/50 rounded-2xl p-5 border border-white/5 relative z-10">
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Tu Saldo</p>
                                <div className="text-5xl font-black text-green-400 tracking-tight">M{me.balance}</div>
                            </div>
                        </div>

                        <div className="p-6 space-y-4">
                            <button 
                                onClick={rollDice}
                                disabled={!isMyTurn}
                                className={`w-full p-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all transform ${isMyTurn ? 'bg-blue-600 hover:bg-blue-500 active:scale-95' : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'}`}>
                                <Dices className="w-8 h-8" />
                                <span className="font-black text-xl tracking-wide uppercase">Tirar Dados</span>
                            </button>

                            <button className="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white p-4 rounded-xl flex items-center justify-center gap-3 transition">
                                <ArrowRightLeft className="w-5 h-5 text-orange-400" />
                                <span className="font-bold text-sm">Proponer Trueque</span>
                            </button>
                        </div>

                        <div className="px-6 pb-8 flex-1">
                            <div className="flex items-center justify-between mb-4 border-b border-slate-800 pb-2">
                                <h3 className="font-bold text-slate-300 flex items-center gap-2 uppercase tracking-wide text-sm">
                                    <Building2 className="w-4 h-4 text-slate-500" /> Patrimonio
                                </h3>
                                <span className="bg-slate-800 text-slate-400 text-xs font-bold px-3 py-1 rounded-full">{me.properties.length}</span>
                            </div>

                            {me.properties.length === 0 ? (
                                <div className="bg-slate-800/50 rounded-2xl p-8 text-center border border-dashed border-slate-700">
                                    <p className="text-slate-500 font-medium">No tienes propiedades.</p>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {me.properties.map((propId, idx) => {
                                        const propData = boardSpaces.find(s => s.id === propId);
                                        return (
                                            <div key={idx} className="bg-slate-800 rounded-xl p-3 border border-slate-700 flex items-center gap-4">
                                                <div className={`w-3 h-10 rounded-full ${propData.color || 'bg-gray-400'}`}></div>
                                                <div>
                                                    <h4 className="font-bold text-white text-sm">{propData.name}</h4>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{propData.type}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Renderizar la aplicación
        const root = createRoot(document.getElementById('root'));
        root.render(<PatopolyApp />);
    </script>
</body>
</html>
