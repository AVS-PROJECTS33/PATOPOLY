                        const { spaceId, toPlayerId, multiplier, nextTurnIndex } = gameState.awaitingUtilityRoll;
                        const total = roll.d1 + roll.d2;
                        const rentAmount = total * multiplier;
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                activeRoll: null,
                                awaitingUtilityRoll: null,
                                awaitingRent: { playerId: roll.playerId, spaceId, amount: rentAmount, toPlayerId, nextTurnIndex, houses: 0 },
                                logs: [...(gameState.logs || []), `${gameState.players.find(p=>p.id===roll.playerId).name} sacó un ${total} en los dados. Debe pagar M${rentAmount}.`]
                            });
                        } catch(e) { console.error(e); }
                        return;
                    }

                    let updatedPlayers = gameState.players;
                    let passGoLogMsg = '';
                    if (roll.passedGo) {
                        SoundFX.applause();
                        updatedPlayers = updatedPlayers.map(p => p.id === playerId ? { ...p, balance: p.balance + 200 } : p);
                        passGoLogMsg = `¡${gameState.players.find(p=>p.id===playerId).name} cobró M200 por pasar por la Salida!`;
                    }

                    const landedSpace = boardSpaces[roll.to];
                    const isOwnable = landedSpace && (landedSpace.type === 'property' || landedSpace.type === 'station' || landedSpace.type === 'utility');
                    const alreadyOwned = gameState.players.some(p => p.properties && p.properties.includes(landedSpace.id));
                    const isTax = landedSpace && landedSpace.type === 'tax';
                    const isFreeParking = landedSpace && landedSpace.id === 20;
                    const isGoToJail = landedSpace && landedSpace.id === 30;
                    const isChance = landedSpace && landedSpace.type === 'chance';
                    const isCommunity = landedSpace && landedSpace.type === 'community';
                    
                    const logsToAppend = passGoLogMsg ? [passGoLogMsg] : [];

                    if (isGoToJail) {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                awaitingGoToJail: { playerId: roll.playerId, nextTurnIndex: roll.nextTurnIndex },
                                players: updatedPlayers,
                                logs: [...(gameState.logs || []), ...logsToAppend, `¡${gameState.players.find(p=>p.id===playerId).name} ha caído en Vaya a la Cárcel!`]
                            });
                        } catch(e) { console.error(e); }
                    } else if (isChance || isCommunity) {
                        let deckKey = isChance ? 'chanceDeck' : 'communityDeck';
                        let currentDeck = gameState[deckKey] || [];
                        const baseDeck = isChance ? chanceCards : communityChestCards;
                        if (currentDeck.length === 0) {
                            currentDeck = baseDeck.map(c => c.id).sort(() => Math.random() - 0.5);
                        }
                        const drawnCardId = currentDeck[0];
                        const nextDeck = currentDeck.slice(1);
                        const randomCard = baseDeck.find(c => c.id === drawnCardId);
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                [deckKey]: nextDeck,
                                isAnimating: false,
                                activeCard: { 
                                    type: isChance ? 'chance' : 'community', 
                                    cardId: randomCard.id, 
                                    playerId: roll.playerId, 
                                    nextTurnIndex: roll.nextTurnIndex 
                                },
                                players: updatedPlayers,
                                ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                            });
                        } catch(e) { console.error(e); }
                    } else if (isTax) {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                awaitingTax: { playerId: roll.playerId, spaceId: roll.to, amount: landedSpace.price, nextTurnIndex: roll.nextTurnIndex },
                                players: updatedPlayers,
                                ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                            });
                        } catch(e) { console.error(e); }
                    } else if (isOwnable && !alreadyOwned) {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                awaitingPurchase: { playerId: roll.playerId, spaceId: roll.to, nextTurnIndex: roll.nextTurnIndex },
                                players: updatedPlayers,
                                ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                            });
                        } catch(e) { console.error(e); }
                    } else if (isOwnable && alreadyOwned) {
                        const owner = gameState.players.find(p => p.properties?.includes(landedSpace.id));
                        if (owner && owner.id !== playerId && !owner.mortgaged?.includes(landedSpace.id)) {
                            let rentAmount = 0;
                            let houses = 0;
                            if (landedSpace.type === 'property') {
                                houses = owner.buildings?.[landedSpace.id] || 0;
                                const groupSpaces = boardSpaces.filter(s => s.color === landedSpace.color);
                                const hasAllColors = groupSpaces.every(s => owner.properties?.includes(s.id));
                                rentAmount = houses > 0 ? landedSpace.rent[houses + 1] : (hasAllColors ? landedSpace.rent[1] : landedSpace.rent[0]);
                            } else if (landedSpace.type === 'station') {
                                const count = owner.properties.filter(id => boardSpaces[id].type === 'station').length;
                                rentAmount = landedSpace.rent[count - 1];
                            } else if (landedSpace.type === 'utility') {
                                const count = owner.properties.filter(id => boardSpaces[id].type === 'utility').length;
                                const multiplier = count === 2 ? 10 : 4;
                                try {
                                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                        isAnimating: false,
                                        awaitingUtilityRoll: { playerId: roll.playerId, spaceId: roll.to, toPlayerId: owner.id, multiplier, nextTurnIndex: roll.nextTurnIndex },
                                        players: updatedPlayers,
                                        ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend, `${gameState.players.find(p=>p.id===playerId).name} debe tirar los dados para pagar la Compañía.`] } : {})
                                    });
                                } catch(e) { console.error(e); }
                                return;
                            }

                            try {
                                await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                    isAnimating: false,
                                    awaitingRent: { playerId: roll.playerId, spaceId: roll.to, amount: rentAmount, toPlayerId: owner.id, nextTurnIndex: roll.nextTurnIndex, houses },
                                    players: updatedPlayers,
                                    ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                                });
                            } catch(e) { console.error(e); }
                        } else {
                            try {
                                await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                    currentTurnIndex: roll.nextTurnIndex,
                                    isAnimating: false,
                                    players: updatedPlayers,
                                    ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                                });
                            } catch(e) { console.error(e); }
                        }
                    } else if (isFreeParking && (gameState.freeParkingPot || 0) > 0) {
                        SoundFX.honk();
                        const potAmount = gameState.freeParkingPot || 0;
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                isAnimating: false,
                                freeParkingClaim: { playerId: roll.playerId, amount: potAmount, nextTurnIndex: roll.nextTurnIndex, playerName: gameState.players.find(p=>p.id===playerId).name },
                                ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                            });
                        } catch(e) { console.error(e); }
                    } else {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                currentTurnIndex: roll.nextTurnIndex,
                                isAnimating: false,
                                players: updatedPlayers,
                                ...(logsToAppend.length ? { logs: [...(gameState.logs || []), ...logsToAppend] } : {})
                            });
                        } catch(e) { console.error(e); }
                    }
                }
            };

            const handleUseJailCard = async () => {
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return;
                if (!me.inJail || !me.getOutJailFreeCards || me.getOutJailFreeCards <= 0) return;
                
                const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, getOutJailFreeCards: p.getOutJailFreeCards - 1 } : p);
                const logMsg = `${me.name} usó una carta para salir gratis de la cárcel.`;
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), logMsg]
                    });
                } catch (e) { console.error(e); }
            };

            const handleAcceptCard = async () => {
                const ac = gameState.activeCard;
                if (!ac || ac.playerId !== playerId) return;
                
                const deck = ac.type === 'chance' ? chanceCards : communityChestCards;
                const card = deck.find(c => c.id === ac.cardId);
                if (!card) return;

                let updateData = { activeCard: null, currentTurnIndex: ac.nextTurnIndex };
                let updatedPlayers = [...gameState.players];
                let pIndex = updatedPlayers.findIndex(p => p.id === playerId);
                let meUpdated = { ...updatedPlayers[pIndex] };
                let newPot = gameState.freeParkingPot || 0;
                let logMsg = `${meUpdated.name} sacó una carta: "${card.text}"`;

                if (card.action === 'moveTo') {
                    const oldPos = meUpdated.position;
                    meUpdated.position = card.value;
                    const didPassGo = card.value === 0 || (card.id === 'c2' && oldPos > card.value);
                    
                    updateData.activeRoll = { 
                        playerId: meUpdated.id, 
                        playerName: meUpdated.name, 
                        token: meUpdated.token, 
                        d1: 0, 
                        d2: 0, 
                        totalMove: 0, 
                        from: oldPos, 
                        to: card.value, 
                        nextTurnIndex: ac.nextTurnIndex, 
                        timestamp: Date.now(), 
                        passedGo: didPassGo, 
                        isTeleport: true, 
                        hideDice: true 
                    };
                    updateData.isAnimating = true;
                    delete updateData.currentTurnIndex; 
                } else if (card.action === 'moveRelative') {
                    const oldPos = meUpdated.position;
                    let newPos = oldPos + card.value;
                    if (newPos < 0) newPos += 40;
                    meUpdated.position = newPos;
                    updateData.activeRoll = { playerId: meUpdated.id, playerName: meUpdated.name, token: meUpdated.token, d1: 0, d2: 0, totalMove: card.value, from: oldPos, to: newPos, nextTurnIndex: ac.nextTurnIndex, timestamp: Date.now(), passedGo: false, hideDice: true };
                    updateData.isAnimating = true;
                    delete updateData.currentTurnIndex; 
                } else if (card.action === 'goToJail') {
                    const oldPos = meUpdated.position;
                    const newPos = 10;
                    meUpdated.position = newPos;
                    meUpdated.inJail = true;
                    meUpdated.jailTurns = 0;
                    updateData.activeRoll = { playerId: meUpdated.id, playerName: meUpdated.name, token: meUpdated.token, d1: 0, d2: 0, totalMove: 0, from: oldPos, to: newPos, nextTurnIndex: ac.nextTurnIndex, timestamp: Date.now(), passedGo: false, isTeleport: true, hideDice: true };
                    updateData.isAnimating = true;
                    delete updateData.currentTurnIndex; 
                } else if (card.action === 'payBank') {
                    meUpdated.balance -= card.value;
                    newPot += card.value;
                    updateData.freeParkingPot = newPot;
                } else if (card.action === 'receiveBank') {
                    meUpdated.balance += card.value;
                } else if (card.action === 'payPlayers') {
                    updatedPlayers = updatedPlayers.map(p => p.id === playerId ? { ...p, balance: p.balance - (card.value * (updatedPlayers.length - 1)) } : { ...p, balance: p.balance + card.value });
                    meUpdated = updatedPlayers[pIndex];
                } else if (card.action === 'receivePlayers') {
                    updatedPlayers = updatedPlayers.map(p => p.id === playerId ? { ...p, balance: p.balance + (card.value * (updatedPlayers.length - 1)) } : { ...p, balance: p.balance - card.value });
                    meUpdated = updatedPlayers[pIndex];
                } else if (card.action === 'jailFree') {
                    meUpdated.getOutJailFreeCards = (meUpdated.getOutJailFreeCards || 0) + 1;
                } else if (card.action === 'repairs') {
                    let cost = (meUpdated.properties ? meUpdated.properties.length : 0) * card.value;
                    meUpdated.balance -= cost;
                    newPot += cost;
                    updateData.freeParkingPot = newPot;
                    logMsg += ` (Pagó M${cost})`;
                }

                updatedPlayers[pIndex] = meUpdated;
                updateData.players = updatedPlayers;
                updateData.logs = [...(gameState.logs || []), logMsg];

                try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updateData); } catch(e) { console.error(e); }
            };

            const handleAcceptGoToJail = async () => {
                if (!gameState.awaitingGoToJail) return;
                const ac = gameState.awaitingGoToJail;
                if (ac.playerId !== playerId) return;
                
                SoundFX.jail();
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) return { ...p, position: 10, inJail: true, jailTurns: 0 };
                    return p;
                });
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        awaitingGoToJail: null,
                        activeRoll: {
                            playerId: me.id,
                            playerName: me.name,
                            token: me.token,
                            d1: 0, d2: 0, totalMove: 0,
                            from: 30, to: 10,
                            nextTurnIndex: ac.nextTurnIndex,
                            timestamp: Date.now(),
                            passedGo: false,
                            isTeleport: true,
                            hideDice: true
                        },
                        isAnimating: true,
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `¡${me.name} fue llevado a la cárcel!`]
                    });
                } catch(e) { console.error(e); }
            };

            const handlePayJail = async () => {
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return;
                if (!me.inJail || me.balance < 50) return;
                
                const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, balance: p.balance - 50 } : p);
                const logMsg = `${me.name} pagó M50 para salir de la cárcel.`;
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        freeParkingPot: (gameState.freeParkingPot || 0) + 50,
                        logs: [...(gameState.logs || []), logMsg]
                    });
                } catch (e) { console.error(e); }
            };



            const handleBuyProperty = async (accept) => {
                if (accept) SoundFX.cash();
                const ap = gameState.awaitingPurchase;
                if (!ap || ap.playerId !== playerId) return;
                const space = boardSpaces[ap.spaceId];
                let updateData = {
                    awaitingPurchase: null,
                    currentTurnIndex: ap.nextTurnIndex
                };
                if (accept && me.balance >= space.price) {
                    updateData.players = gameState.players.map(p => {
                        if (p.id === playerId) {
                            return { ...p, balance: p.balance - space.price, properties: [...(p.properties || []), space.id] };
                        }
                        return p;
                    });
                    updateData.logs = [...(gameState.logs || []), `${me.name} ha comprado ${space.name} por M${space.price}.`];
                }
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updateData);
                } catch(e) { console.error(e); }
            };

            const handlePayTax = async () => {
                if (!gameState.awaitingTax) return;
                const { amount, nextTurnIndex } = gameState.awaitingTax;
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) return { ...p, balance: p.balance - amount };
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        awaitingTax: null,
                        freeParkingPot: (gameState.freeParkingPot || 0) + amount,
                        currentTurnIndex: nextTurnIndex,
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} pagó M${amount} de impuestos.`]
                    });
                } catch(e) { console.error(e); }
            };

            const handleClaimParking = async () => {
                if (!gameState.freeParkingClaim) return;
                const { amount, nextTurnIndex } = gameState.freeParkingClaim;
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) return { ...p, balance: p.balance + amount };
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        freeParkingClaim: null,
                        freeParkingPot: 0,
                        currentTurnIndex: nextTurnIndex,
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `¡${me.name} reclamó el bote del Parking Gratuito de M${amount}!`]
                    });
                } catch(e) { console.error(e); }
            };

            const handlePayRent = async () => {
                if (!gameState.awaitingRent) return;
                const { amount, toPlayerId, nextTurnIndex, spaceId, houses } = gameState.awaitingRent;
                
                const spaceName = boardSpaces[spaceId]?.name || 'Propiedad';

                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) return { ...p, balance: p.balance - amount };
                    if (p.id === toPlayerId) return { ...p, balance: p.balance + amount };
                    return p;
                });

                const receiver = gameState.players.find(p => p.id === toPlayerId);
                try {
                                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        awaitingRent: null,
                        rentReceivedAlert: { playerId: toPlayerId, fromName: me.name, amount, spaceName, houses },
                        currentTurnIndex: nextTurnIndex,
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} pagó M${amount} de alquiler a ${receiver?.name} por caer en ${spaceName}.`]
                    });
                } catch(e) { console.error(e); }
            };

            const handleMortgage = async (spaceId) => {
                const space = boardSpaces[spaceId];
                const myBuildings = me.buildings?.[spaceId] || 0;
                if (myBuildings > 0) return;
                
                const mortgageVal = space.mortgage || Math.floor(space.price / 2);
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, balance: p.balance + mortgageVal, mortgaged: [...(p.mortgaged || []), spaceId] };
                    }
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} hipotecó ${space.name} y obtuvo M${mortgageVal}.`]
                    });
                    setSelectedSpacePC(null);
                } catch(e) { console.error(e); }
            };

            const handleUnmortgage = async (spaceId) => {
                const space = boardSpaces[spaceId];
                const mortgageVal = space.mortgage || Math.floor(space.price / 2);
                const unmortgageVal = Math.floor(mortgageVal * 1.1);
                if (me.balance < unmortgageVal) return;
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, balance: p.balance - unmortgageVal, mortgaged: (p.mortgaged || []).filter(id => id !== spaceId) };
                    }
                    return p;
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} deshipotecó ${space.name} pagando M${unmortgageVal}.`]
                    });
                    setSelectedSpacePC(null);
                } catch(e) { console.error(e); }
            };

            const handleBuild = async (spaceId, qty = 1) => {
                const space = boardSpaces[spaceId];
                const totalCost = space.houseCost * qty;
                if (me.balance < totalCost) return;

                const myBuildings = me.buildings || {};
                const currentCount = myBuildings[spaceId] || 0;
                if (currentCount + qty > 5) return;

                const newBuildings = { ...myBuildings, [spaceId]: currentCount + qty };
                
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, balance: p.balance - totalCost, buildings: newBuildings };
                    }
                    return p;
                });

                const buildName = (currentCount + qty) === 5 ? 'un Hotel' : (qty > 1 ? `${qty} Casas` : 'una Casa');
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} construyó ${buildName} en ${space.name} por M${totalCost}.`]
                    });
                    setSelectedSpacePC(null); // Force close to refresh or we can leave it open but it doesn't auto-update the modal easily unless we wait for snapshot
                } catch(e) { console.error(e); }
            };

            const handleSellBuild = async (spaceId) => {
                const space = boardSpaces[spaceId];
                const myBuildings = me.buildings || {};
                const currentCount = myBuildings[spaceId] || 0;
                if (currentCount <= 0) return;

                const newBuildings = { ...myBuildings, [spaceId]: currentCount - 1 };
                const sellPrice = Math.floor(space.houseCost / 2);
                
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, balance: p.balance + sellPrice, buildings: newBuildings };
                    }
                    return p;
                });

                const buildName = currentCount === 5 ? 'un Hotel' : 'una Casa';
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `${me.name} vendió ${buildName} en ${space.name} y obtuvo M${sellPrice}.`]
                    });
                    setSelectedSpacePC(null);
                } catch(e) { console.error(e); }
            };

            if (!gameState) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Cargando sala...</div>;

            const me = gameState.players.find(p => p.id === playerId);

            // PANTALLA DE SELECCIÓN DE FICHA
            if (!me || !me.hasJoined) {
                const availablePlayers = gameState.players.filter(p => !p.hasJoined);
                const takenTokens = gameState.players.filter(p => p.hasJoined).map(p => p.token);
                
                return (
                    <div className="min-h-screen bg-cover bg-center flex flex-col items-center justify-center p-4 relative" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-0"></div>
                        <div className="glass-panel w-full max-w-md rounded-3xl p-6 shadow-2xl border border-white/10 relative z-10">
                            
                            {!playerId ? (
                                <div className="animate-fade-in">
                                    <h1 className="text-3xl font-black text-center text-white mb-2">Unirse a la Partida</h1>
                                    <p className="text-slate-300 text-center mb-8">¿Quién eres?</p>
                                    <div className="space-y-3">
                                        {gameState.players.map(p => {
                                            const localId = sessionStorage.getItem(`patopoly_playerId_${gameId}`);
                                            const isMeInLocal = localId === p.id;
                                            const last = gameState.lastSeen?.[p.id] || 0;
                                            const isOnline = (Date.now() - last) < 12000;
                                            const canSelect = !p.hasJoined || !isOnline || isMeInLocal;
                                            
                                            return (
                                                <button key={p.id} disabled={!canSelect} onClick={() => {
                                                    setPlayerId(p.id);
                                                    if (p.hasJoined) {
                                                        sessionStorage.setItem(`patopoly_playerId_${gameId}`, p.id);
                                                    }
                                                }} className={`w-full text-left p-4 rounded-xl border-2 transition flex items-center group ${canSelect ? 'border-slate-700 bg-slate-800/50 text-slate-200 hover:bg-slate-700 hover:border-slate-500 cursor-pointer' : 'border-slate-800 bg-slate-900/50 text-slate-500 cursor-not-allowed opacity-50'}`}>
                                                    <UserCircle2 className={`w-6 h-6 mr-3 transition ${canSelect ? 'opacity-50 group-hover:opacity-100 group-hover:text-blue-400' : 'opacity-20'}`} /> 
                                                    <span className="text-lg">{p.name}</span>
                                                    {p.hasJoined && isOnline && !isMeInLocal && <span className="ml-auto text-[10px] text-red-400 font-black uppercase tracking-wider bg-red-900/30 px-2 py-1 rounded">En partida</span>}
                                                    {p.hasJoined && (!isOnline || isMeInLocal) && <span className="ml-auto text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded font-black uppercase tracking-wider">Reconectar</span>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-fade-in flex flex-col h-full">
                                    <button onClick={() => setPlayerId('')} className="text-slate-400 hover:text-white flex items-center gap-2 mb-6 text-sm font-bold uppercase tracking-wider transition w-fit">
                                        <ArrowRight className="w-4 h-4 rotate-180" /> Volver
                                    </button>
                                    <h1 className="text-2xl font-black text-center text-white mb-2">Elige tu Ficha</h1>
                                    <p className="text-slate-300 text-center mb-8">Selecciona la ficha con la que jugarás</p>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-8">
                                        {availableTokens.map(token => {
                                            const isTaken = takenTokens.includes(token.id);
                                            const isSelected = selectedToken === token.id;
                                            return (
                                                <button key={token.id} disabled={isTaken} onClick={() => setSelectedToken(token.id)} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all ${isTaken ? 'opacity-30 cursor-not-allowed border-slate-800 bg-slate-900/50' : isSelected ? 'border-green-500 bg-green-500/20 scale-105 shadow-[0_0_15px_rgba(34,197,94,0.3)]' : 'border-slate-700 bg-slate-800/50 hover:border-slate-500 hover:bg-slate-700'}`}>
                                                    <div className="mb-2 flex justify-center"><TokenIcon tokenId={token.id} className="w-12 h-12" /></div>
                                                    <span className={`text-[10px] sm:text-xs font-bold uppercase tracking-wider ${isSelected ? 'text-green-400' : 'text-slate-300'}`}>{token.name}</span>
                                                    {isTaken && <span className="text-[10px] text-red-400 mt-1 uppercase font-black">Ocupada</span>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => handleJoin(playerId)} disabled={!selectedToken} className="w-full bg-gradient-to-r from-green-500 to-green-600 disabled:opacity-50 text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg uppercase tracking-wide hover:from-green-400 hover:to-green-500 transform active:scale-95 disabled:active:scale-100 mt-auto">Entrar al Tablero</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // PANTALLA DE ESPERA: jugador ya se unió pero no todos han entrado aún
            const allJoinedPC = gameState.players.every(p => p.hasJoined);
            if (!allJoinedPC) {
                const joinedCount = gameState.players.filter(p => p.hasJoined).length;
                return (
                    <div className="min-h-screen bg-cover bg-center flex flex-col items-center justify-center p-4 relative" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                        <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm z-0"></div>
                        <div className="glass-panel w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-white/10 relative z-10 flex flex-col items-center gap-6 text-white text-center">
                            <div className="relative">
                                <div className="w-16 h-16 rounded-full border-4 border-blue-500/30 border-t-blue-500 animate-spin"></div>
                                <div className="absolute inset-0 flex items-center justify-center text-2xl">⏳</div>
                            </div>
                            <div>
                                <h2 className="text-2xl font-black uppercase mb-1">Esperando Jugadores</h2>
                                <p className="text-slate-300 text-sm">{joinedCount} de {gameState.players.length} jugadores listos</p>
                            </div>
                            <div className="w-full flex flex-col gap-2">
                                {gameState.players.map((p, i) => (
                                    <div key={i} className="flex items-center justify-between bg-white/5 px-4 py-2 rounded-lg border border-white/10">
                                        <span className="font-medium text-slate-200">{p.name}</span>
                                        {p.hasJoined
                                            ? <span className="text-green-400 font-bold flex items-center gap-2"><TokenIcon tokenId={p.token} className="w-5 h-5" /> ✓ Listo</span>
                                            : <span className="text-slate-500 italic text-sm">Esperando...</span>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // PANTALLA INIT ROLL: todos listos, tirada de orden
            const initRolls = gameState.initRolls || {};
            const myInitRoll = initRolls[playerId];
            const allRolledPC = gameState.players.every(p => initRolls[p.id] !== undefined);

            if (gameState.status !== 'playing') {
                if (gameState.status === 'init_results') {
                    const initRollsAccepted = gameState.initRollsAccepted || {};
                    const myAccept = initRollsAccepted[playerId];
                    const sortedPlayers = [...gameState.players];
                    
                    const handleAcceptInit = async () => {
                        if (myAccept) return;
                        const newAccepted = { ...initRollsAccepted, [playerId]: true };
                        const nowAllAccepted = gameState.players.every(p => newAccepted[p.id]);
                        
                        let updateData = { [`initRollsAccepted.${playerId}`]: true };
                        if (nowAllAccepted) {
                            updateData.status = 'playing';
                        }
                        try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updateData); } catch(e) { console.error(e); }
                    };

                    return (
                        <div className="min-h-screen bg-cover bg-center flex flex-col items-center justify-center p-4 relative" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                            <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm z-0"></div>
                            <div className="glass-panel w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-white/10 relative z-10 flex flex-col items-center gap-6 text-white text-center">
                                <div className="text-5xl">🏆</div>
                                <div>
                                    <h2 className="text-2xl font-black uppercase mb-1">Orden de Juego</h2>
                                    <p className="text-slate-300 text-sm">Este es el orden en el que jugaréis</p>
                                </div>
                                <div className="w-full flex flex-col gap-2 mt-2">
                                    {sortedPlayers.map((p, i) => {
                                        const pRoll = gameState.initRolls ? gameState.initRolls[p.id] : null;
                                        const total = pRoll ? pRoll.d1 + pRoll.d2 : 0;
                                        return (
                                            <div key={i} className={`flex items-center justify-between px-4 py-2 rounded-lg border ${initRollsAccepted[p.id] ? 'bg-green-500/20 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                                                <div className="flex items-center gap-2">
                                                    <span className="font-black text-slate-400 w-4 text-left">{i + 1}</span>
                                                    <TokenIcon tokenId={p.token} className="w-5 h-5" />
                                                    <span className="font-medium text-slate-200">{p.name}</span>
                                                    {total > 0 && <span className="ml-1 text-[10px] font-black text-yellow-400 bg-yellow-400/10 px-1.5 py-0.5 rounded border border-yellow-400/20">🎲 {total}</span>}
                                                </div>
                                                {initRollsAccepted[p.id] ? <span className="text-green-400 text-xs font-black">✓ LISTO</span> : <span className="text-slate-500 text-xs italic">Esperando...</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                                {!myAccept ? (
                                    <button onClick={handleAcceptInit} className="w-full py-4 mt-2 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-black text-xl shadow-lg transition-all active:scale-95 uppercase tracking-wider">
                                        Aceptar y Empezar
                                    </button>
                                ) : (
                                    <p className="text-slate-400 text-sm mt-2">Esperando a que los demás acepten...</p>
                                )}
                            </div>
                        </div>
                    );
                }

                const handleInitRoll = async () => {
                    if (myInitRoll) return; // Ya tiré
                    const d1 = Math.floor(Math.random() * 6) + 1;
                    const d2 = Math.floor(Math.random() * 6) + 1;
                    const newInitRolls = { ...initRolls, [playerId]: { d1, d2 } };
                    const allNowRolled = gameState.players.every(p => newInitRolls[p.id] !== undefined);

                    const updateData = { [`initRolls.${playerId}`]: { d1, d2 } };

                    if (allNowRolled) {
                        // Ordenar jugadores por puntuación descendente
                        const sorted = [...gameState.players].sort((a, b) => {
                            const ra = newInitRolls[a.id]; const rb = newInitRolls[b.id];
                            return (rb.d1 + rb.d2) - (ra.d1 + ra.d2);
                        });
                        const sortedPlayers = sorted.map(s => gameState.players.find(p => p.id === s.id));
                        updateData.players = sortedPlayers;
                        updateData.currentTurnIndex = 0;
                        updateData.status = 'init_results';
                        updateData.logs = [...(gameState.logs || []), `¡Orden decidido! Empieza ${sortedPlayers[0].name} con ${newInitRolls[sortedPlayers[0].id].d1 + newInitRolls[sortedPlayers[0].id].d2} puntos.`];
                    }
                    try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updateData); } catch(e) { console.error(e); }
                };

                return (
                    <div className="min-h-screen bg-cover bg-center flex flex-col items-center justify-center p-4 relative" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                        <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm z-0"></div>
                        <div className="glass-panel w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-white/10 relative z-10 flex flex-col items-center gap-6 text-white text-center">
                            <div className="text-5xl">🎲</div>
                            <div>
                                <h2 className="text-2xl font-black uppercase mb-1">¡Todos Listos!</h2>
                                <p className="text-slate-300 text-sm">Lanza los dados para determinar el orden de juego</p>
                            </div>

                            {!myInitRoll ? (
                                <button onClick={handleInitRoll} className="w-full py-5 rounded-2xl bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 text-white font-black text-xl shadow-lg transition-all active:scale-95 uppercase tracking-wider">
                                    🎲 ¡Tirar Dados!
                                </button>
                            ) : (
                                <div className="flex flex-col items-center gap-2">
                                    <div className="flex items-center gap-3 text-5xl">
                                        <span>{myInitRoll.d1 === 1 ? '⚀' : myInitRoll.d1 === 2 ? '⚁' : myInitRoll.d1 === 3 ? '⚂' : myInitRoll.d1 === 4 ? '⚃' : myInitRoll.d1 === 5 ? '⚄' : '⚅'}</span>
                                        <span>{myInitRoll.d2 === 1 ? '⚀' : myInitRoll.d2 === 2 ? '⚁' : myInitRoll.d2 === 3 ? '⚂' : myInitRoll.d2 === 4 ? '⚃' : myInitRoll.d2 === 5 ? '⚄' : '⚅'}</span>
                                    </div>
                                    <p className="text-2xl font-black text-green-400">Total: {myInitRoll.d1 + myInitRoll.d2}</p>
                                    <p className="text-slate-400 text-sm mt-2">{allRolledPC ? 'Preparando resultados...' : 'Esperando a los demás...'}</p>
                                </div>
                            )}

                            <div className="w-full flex flex-col gap-2 mt-2">
                                {gameState.players.map((p, i) => {
                                    const roll = initRolls[p.id];
                                    return (
                                        <div key={i} className={`flex items-center justify-between px-4 py-2 rounded-lg border ${roll ? 'bg-green-500/10 border-green-500/30' : 'bg-white/5 border-white/10'}`}>
                                            <div className="flex items-center gap-2">
                                                <TokenIcon tokenId={p.token} className="w-5 h-5" />
                                                <span className="font-medium text-slate-200">{p.name}</span>
                                            </div>
                                            {roll
                                                ? <span className="text-green-400 font-black">{roll.d1 + roll.d2}</span>
                                                : <span className="text-slate-500 italic text-xs">Tirando...</span>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            // PANTALLA PRINCIPAL DE JUGADOR (TABLERO + CONTROLES)
            const activePlayers = gameState.players.filter(p => p.hasJoined && !p.isBankrupt);
            if (gameState.status === 'playing' && activePlayers.length === 1) {
                const winner = activePlayers[0];
                return (

                                </div>
                            </div>
                        </div>

                    {/* TRADE SELECTOR MODAL */}
                    {showTradeSelector && (

                                <div className="flex justify-between items-center mb-6">

                                            try {
                                                await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                                    activeTrade: {
                                                        id: `trade_${Date.now()}`,
                                                        status: 'building',
                                                        p1Id: playerId,
                                                        p2Id: p.id,
                                                        p1Offer: { properties: [], money: 0, locked: false, accepted: false },
                                                        p2Offer: { properties: [], money: 0, locked: false, accepted: false }
                                                    },
                                                    logs: [...(gameState.logs || []), `${me.name} quiere negociar un trueque con ${p.name}.`]
                                                });
                                            } catch(e) { console.error(e); }
                                        }} className="w-full text-left p-4 rounded-xl border border-slate-700 bg-slate-800 hover:bg-slate-700 hover:border-slate-500 transition flex items-center gap-3 group">

                                            <span className="font-bold text-lg text-white group-hover:text-orange-400 transition-colors">{p.name}</span>

                                    {gameState.players.filter(p => p.hasJoined && p.id !== playerId).length === 0 && (
                                        <p className="text-slate-500 text-center italic py-4">No hay otros jugadores en la partida.</p>

                                </div>
                            </div>
                        </div>

                    {/* TURN SPLASH SCREEN */}
                    {showTurnSplash && (

                                <div className="text-7xl">🎲</div>
                                <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 uppercase tracking-widest drop-shadow-sm">¡Es Tu Turno!</h1>

                                <div className="flex gap-4 mt-4 w-full">

                                        Tirar Dados
                                    </button>
                                </div>
                            </div>
                        </div>

                    {/* TRADE ALERT SPLASH */}
                    {gameState.tradeAlert && (
                        <div className="fixed inset-0 z-[350] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in duration-300">

                            </div>
                        </div>

                    {/* TARJETA DE PROPIEDAD DESDE PANEL */}
                    {selectedSpacePC && (() => {
                        const pcOwner = gameState.players.find(p => p.properties?.includes(selectedSpacePC.id));
                        const pcIsOwner = pcOwner?.id === playerId;
                        const pcIsMortgaged = pcOwner?.mortgaged?.includes(selectedSpacePC.id) || false;

                        let canBuild = false;
                        let canSellBuild = false;
                        let canMortgage = false;
                        let currentBuildings = 0;
                        let hasAllColors = false;

                        if (pcOwner && selectedSpacePC.type === 'property') {
                            const groupSpaces = boardSpaces.filter(s => s.color === selectedSpacePC.color);
                            hasAllColors = groupSpaces.every(s => pcOwner.properties?.includes(s.id));
                            const myBuildings = pcOwner.buildings || {};
                            currentBuildings = myBuildings[selectedSpacePC.id] || 0;
                            
                            if (pcIsOwner && !pcIsMortgaged) {
                                if (hasAllColors && currentBuildings < 5 && pcOwner.balance >= selectedSpacePC.houseCost) {
                                    // Extra check: none in color group can be mortgaged to build
                                    const anyMortgaged = groupSpaces.some(s => pcOwner.mortgaged?.includes(s.id));
                                    if (!anyMortgaged && isMyTurn) canBuild = true;
                                }
                                
                                if (currentBuildings > 0) {
                                    canSellBuild = true;
                                }
                                
                                if (currentBuildings === 0 && isMyTurn) {
                                    const anyHousesInGroup = groupSpaces.some(s => (pcOwner.buildings?.[s.id] || 0) > 0);
                                    if (!anyHousesInGroup) canMortgage = true;
                                }
                            }
                        } else if (pcOwner && (selectedSpacePC.type === 'station' || selectedSpacePC.type === 'utility')) {
                            if (pcIsOwner && !pcIsMortgaged && isMyTurn) {
                                canMortgage = true;
                            }
                        }

                        return (
                                <PropertyCard 
                                    space={selectedSpacePC}
                                    owner={pcOwner}
                                    isOwner={pcIsOwner}
                                    isMortgaged={pcIsMortgaged}
                                    buildings={currentBuildings}
                                    hasAllColors={hasAllColors}
                                    canBuild={canBuild}
                                    canSellBuild={canSellBuild}
                                    canMortgage={canMortgage}
                                    onMortgage={() => handleMortgage(selectedSpacePC.id)}
                                    onUnmortgage={() => handleUnmortgage(selectedSpacePC.id)}
                                    onBuild={(qty) => handleBuild(selectedSpacePC.id, qty)}
                                    onSellBuild={() => handleSellBuild(selectedSpacePC.id)}
                                    onClose={() => setSelectedSpacePC(null)}
                                />
                        );
                    })()}

                    <div className="absolute inset-0 bg-slate-900/30 backdrop-blur-sm z-0"></div>
                    
                    {/* MODAL IMPUESTO */}
                        {gameState.awaitingTax && gameState.awaitingTax.playerId === playerId && (() => {
                            const taxSpace = boardSpaces[gameState.awaitingTax.spaceId];
                            return (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                    <div className="bg-slate-900 border border-white/10 rounded-3xl shadow-2xl max-w-sm w-full p-6 flex flex-col items-center gap-5">
                                        <div className="text-6xl">💸</div>
                                        <h2 className="text-2xl font-black text-white text-center uppercase tracking-wider">{taxSpace.name}</h2>
                                        <p className="text-slate-400 text-sm text-center">Debes pagar al banco</p>
                                        <div className="bg-slate-800 rounded-2xl px-8 py-4 text-center border border-slate-700">
                                            <p className="text-4xl font-black text-red-400">M{gameState.awaitingTax.amount}</p>
                                        </div>
                                        {me.balance >= gameState.awaitingTax.amount ? (
                                            <button onClick={handlePayTax} className="w-full py-4 rounded-xl bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-black text-lg transition border border-red-500 shadow-lg uppercase tracking-wider">Pagar</button>
                                        ) : (
                                            <div className="w-full text-center">
                                                <button disabled className="w-full py-4 rounded-xl bg-slate-800 text-slate-500 font-black text-lg border border-slate-700 uppercase tracking-wider cursor-not-allowed">Fondos Insuficientes</button>
                                                <p className="text-xs text-red-400 mt-2 font-bold animate-pulse">Vende casas o hipoteca desde Patrimonio.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })()}
                        {/* MODAL PAGAR ALQUILER */}
                        {gameState.awaitingRent && gameState.awaitingRent.playerId === playerId && (() => {
                            const rentSpace = boardSpaces[gameState.awaitingRent.spaceId];
                            const receiver = gameState.players.find(p => p.id === gameState.awaitingRent.toPlayerId);
                            const hCount = gameState.awaitingRent.houses || 0;
                            const hText = hCount === 0 ? 'Sin construir' : hCount === 5 ? 'Con Hotel' : `Con ${hCount} casa${hCount>1?'s':''}`;
                            return (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                    <div className="bg-slate-900 border border-red-500/30 rounded-3xl shadow-2xl max-w-sm w-full p-6 flex flex-col items-center gap-5">
                                        <div className="text-6xl">💸</div>
                                        <div className="text-center">
                                            <h2 className="text-xl font-bold text-slate-300">Has caído en</h2>
                                            <h1 className="text-3xl font-black text-white uppercase tracking-wider">{rentSpace.name}</h1>
                                            {rentSpace.type === 'property' && <p className="text-slate-400 text-sm mt-1">{hText}</p>}
                                        </div>
                                        <p className="text-slate-400 text-sm text-center mt-2">Debes pagar alquiler a <span className="font-bold text-white">{receiver?.name}</span></p>
                                        <div className="bg-slate-800 rounded-2xl px-8 py-4 text-center border border-slate-700 w-full">
                                            <p className="text-4xl font-black text-red-400">M{gameState.awaitingRent.amount}</p>
                                        </div>
                                        {me.balance >= gameState.awaitingRent.amount ? (
                                            <button onClick={handlePayRent} className="w-full py-4 rounded-xl bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-black text-lg transition border border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)] uppercase tracking-wider active:scale-95">Pagar</button>
                                        ) : (
                                            <div className="w-full flex flex-col gap-2 text-center">
                                                <button disabled className="w-full py-3 rounded-xl bg-slate-800 text-slate-500 font-black text-sm border border-slate-700 uppercase tracking-wider cursor-not-allowed">Fondos Insuficientes</button>
                                                <button onClick={async () => {
                                                    try {
                                                        await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                                            activeTrade: {
                                                                p1Id: playerId,
                                                                p2Id: gameState.awaitingRent.toPlayerId,
                                                                status: 'building',
                                                                p1Offer: { properties: [], money: 0, locked: false, accepted: false },
                                                                p2Offer: { properties: [], money: 0, locked: false, accepted: false },
                                                                timestamp: Date.now()
                                                            }
                                                        });
                                                    } catch(e) { console.error(e); }
                                                }} className="w-full py-3 rounded-xl bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-400 hover:to-orange-500 text-white font-black text-sm transition border border-orange-500 shadow-lg uppercase tracking-wider active:scale-95 animate-pulse">
                                                    Proponer Trueque
                                                </button>
                                                <p className="text-[10px] text-orange-300 mt-1 font-bold">Ofrece propiedades al dueño para saldar la deuda.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })()}

                        {/* MODAL TIRAR DADOS COMPAÑÍA */}
                        {gameState.awaitingUtilityRoll && gameState.awaitingUtilityRoll.playerId === playerId && !gameState.isAnimating && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-in fade-in zoom-in duration-300">
                                <div className="bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl w-full max-w-sm p-8 flex flex-col items-center text-center">
                                    <div className="text-6xl mb-4">🎲</div>
                                    <h2 className="text-2xl font-black text-white uppercase tracking-widest mb-2">Pago de Servicio</h2>

                                    <button onClick={async () => {
                                        SoundFX.dice();
                                        const d1 = Math.floor(Math.random() * 6) + 1;
                                        const d2 = Math.floor(Math.random() * 6) + 1;
                                        try {
                                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                                                isAnimating: true,
                                                activeRoll: {
                                                    playerId,
                                                    playerName: me.name,
                                                    token: me.token,
                                                    d1, d2,
                                                    totalMove: 0,
                                                    from: me.position,
                                                    to: me.position,
                                                    isUtilityRoll: true
                                                }
                                            });
                                        } catch(e) { console.error(e); }
                                    }} className="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-black text-lg transition border border-blue-500 shadow-lg uppercase tracking-wider active:scale-95">
                                        Tirar Dados
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* MODAL ALQUILER RECIBIDO */}
                        {gameState.rentReceivedAlert && gameState.rentReceivedAlert.playerId === playerId && (
                            <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in zoom-in duration-300">
                                <div className="bg-slate-900 border border-green-500/50 rounded-3xl shadow-[0_0_50px_rgba(34,197,94,0.3)] w-full max-w-sm p-8 flex flex-col items-center gap-6 text-center">
                                    <div className="text-7xl animate-bounce">🤑</div>
                                    <div>
                                        <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 uppercase tracking-widest drop-shadow-sm mb-2">¡Ingreso!</h1>
                                        <p className="text-slate-300 text-base">Has recibido dinero de <strong className="text-white">{gameState.rentReceivedAlert.fromName}</strong> por caer en <strong className="text-white">{gameState.rentReceivedAlert.spaceName}</strong>.</p>

                                    <div className="bg-green-500/10 rounded-2xl px-8 py-4 text-center border border-green-500/30 w-full">
                                        <p className="text-5xl font-black text-green-400">+M{gameState.rentReceivedAlert.amount}</p>
                                    </div>
                                    <button onClick={async () => {

                                        Genial
