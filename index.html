        // --- SISTEMA DE SONIDOS ---
        const SoundFX = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
                }
            },
            playOsc(type, freq, time, vol, sweep = false) {
                if (!this.ctx) this.init();
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (sweep) osc.frequency.exponentialRampToValueAtTime(freq / 2, this.ctx.currentTime + time);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + time);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + time);
            },
            playNoise(time, vol, type = 'highpass', freq = 1000) {
                if (!this.ctx) this.init();
                if (!this.ctx) return;
                const bufferSize = this.ctx.sampleRate * time;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter();
                filter.type = type;
                filter.frequency.value = freq;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + time);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
            },
            cash() {
                this.init();
                this.playOsc('square', 1200, 0.1, 0.05);
                setTimeout(() => this.playOsc('square', 1600, 0.4, 0.05), 80);
            },
            dice() {
                this.init();
                for(let i=0; i<5; i++) {
                    setTimeout(() => this.playNoise(0.05, 0.1, 'highpass', 2000), i * 60 + Math.random()*30);
                }
            },
            applause() {
                this.init();
                this.playNoise(2.5, 0.1, 'lowpass', 600);
                for(let i=0; i<20; i++) {
                    setTimeout(() => this.playNoise(0.1, 0.05, 'highpass', 800), Math.random() * 2000);
                }
            },
            honk() {
                this.init();
                this.playOsc('sawtooth', 350, 0.3, 0.1);
                this.playOsc('sawtooth', 400, 0.3, 0.1);
                setTimeout(() => {
                    this.playOsc('sawtooth', 350, 0.4, 0.1);
                    this.playOsc('sawtooth', 400, 0.4, 0.1);
                }, 400);
            },
            jail() {
                this.init();
                this.playOsc('square', 100, 0.6, 0.2, true);
                this.playNoise(0.5, 0.2, 'lowpass', 400);
                setTimeout(() => {
                    this.playOsc('square', 80, 0.8, 0.2, true);
                    this.playNoise(0.6, 0.2, 'lowpass', 300);
                }, 200);
            }
        };

        function PatopolyApp() {

            const [isPlayerView, setIsPlayerView] = useState(false);
            const [gameId, setGameId] = useState('');
            const [playerId, setPlayerId] = useState('');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlGameId = params.get('gameId');
                const urlRole = params.get('role');
                const urlPlayerId = params.get('playerId');

                if (urlGameId && urlRole === 'player') {
                    setIsPlayerView(true);
                    setGameId(urlGameId);
                }

                signInAnonymously(auth).catch(e => {
                    console.error("Firebase Auth Error:", e);
                    setAuthError(e.message);
                });
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            if (authError) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-8 text-center">
                        <div className="text-6xl mb-4">⚠️</div>

                    </div>
                );
            }

            if (!user) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Conectando...</div>;

            return (
                <div className="min-h-screen font-sans selection:bg-green-300">

                                    <div className="mt-3 pt-2 border-t-2 border-slate-800 flex justify-between text-[10px] font-black">
                                        <div>HIPOTECADO<br/><span className="font-mono">POR M{mortgageVal}</span></div>
                                        <div className="text-right">PARA DESHIP.<br/><span className="font-mono">PAGA M{unmortgageVal}</span></div>
                                    </div>
                                    {isOwner && canMortgage && (
                                        <button onClick={onMortgage} className="w-full mt-3 bg-gradient-to-r from-orange-500 to-red-600 text-white font-black py-2.5 rounded-xl text-sm uppercase tracking-wider shadow-lg hover:from-orange-400 active:scale-95 transition">
                                            Hipotecar – cobrar M{mortgageVal}
                                        </button>
                                    )}
                                    {isOwner && (canBuild || canSellBuild) && (
                                        <div className="flex items-center justify-between bg-slate-800 p-2 rounded-xl mt-3 shadow-inner border border-slate-700">
                                            <button onClick={onSellBuild} disabled={buildings === 0 || !canSellBuild} className="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-red-600 disabled:opacity-50 text-white text-xl font-black flex items-center justify-center hover:from-red-400 hover:to-red-500 active:scale-95 transition shadow">-</button>
                                            <div className="flex flex-col items-center px-4">
                                                <span className="text-white font-black text-sm tracking-wider">{buildings === 5 ? 'HOTEL' : `${buildings} CASAS`}</span>
                                                <span className="text-slate-400 text-[10px] font-bold">M{space.houseCost} c/u</span>
                                            </div>
                                            <button onClick={() => onBuild(1)} disabled={buildings === 5 || !canBuild || (owner?.balance || 0) < space.houseCost} className="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-500 to-green-600 disabled:opacity-50 text-white text-xl font-black flex items-center justify-center hover:from-emerald-400 hover:to-green-500 active:scale-95 transition shadow">+</button>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>

                        {/* FOOTER */}
                        <div className="bg-slate-800 px-3 py-1.5 flex justify-between items-center">
                            {owner ? (
                                <span className="text-xs text-green-400 font-black flex items-center gap-1">⚫ <TokenIcon tokenId={owner.token} className="w-3 h-3" /> {owner.name}</span>
                            ) : (
                                <span className="text-xs text-yellow-400 font-black">✨ EN VENTA – M{space.price}</span>
                            )}
                            <button onClick={onClose} className="text-white/60 hover:text-white text-xs font-bold transition">✕ Cerrar</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE: TABLERO COMPARTIDO ---
        function Board({ gameState, onAnimationComplete }) {
            const playersOnBoard = gameState?.players?.filter(p => p.hasJoined) || [];
            const [displayPositions, setDisplayPositions] = useState({});
            const [animationPhase, setAnimationPhase] = useState('idle'); // 'rolling', 'result', 'moving', 'idle'
            const [currentRoll, setCurrentRoll] = useState(null);
            const [selectedSpace, setSelectedSpace] = useState(null);
            const [showPassGo, setShowPassGo] = useState(false);
            
            useEffect(() => {
                if (gameState?.activeRoll && gameState.activeRoll.timestamp !== currentRoll?.timestamp) {
                    const roll = gameState.activeRoll;
                    setCurrentRoll(roll);
                    setDisplayPositions(prev => ({ ...prev, [roll.playerId]: roll.from }));

                    const startMoving = () => {
                        setAnimationPhase('moving');
                        let currentPos = roll.from;
                        const targetPos = roll.to;
                        
                        if (roll.isTeleport) {
                            setDisplayPositions(prev => ({ ...prev, [roll.playerId]: targetPos }));
                            if (roll.passedGo) {
                                setShowPassGo(true);
                                setTimeout(() => setShowPassGo(false), 2500);
                            }
                            setTimeout(() => {
                                setAnimationPhase('idle');
                                if (onAnimationComplete) onAnimationComplete(roll);
                            }, 500);
                            return;
                        }

                        let isBackwards = false;
                        let totalSteps = currentPos <= targetPos ? (targetPos - currentPos) : (40 - currentPos + targetPos);

                        if (roll.totalMove < 0) {
                            isBackwards = true;
                            totalSteps = Math.abs(roll.totalMove);
                        }

                        if (totalSteps === 0) {
                            setAnimationPhase('idle');
                            if (onAnimationComplete) onAnimationComplete(roll);
                            return;
                        }

                        let step = 0;
                        setShowPassGo(false);
                        const interval = setInterval(() => {
                            step++;
                            if (isBackwards) {
                                currentPos = (currentPos - 1 + 40) % 40;
                            } else {
                                currentPos = (currentPos + 1) % 40;
                            }
                            setDisplayPositions(prev => ({ ...prev, [roll.playerId]: currentPos }));
                            
                            if (!isBackwards && currentPos === 0 && roll.passedGo) {
                                setShowPassGo(true);
                            }
                            
                            if (step >= totalSteps) {
                                clearInterval(interval);
                                setAnimationPhase('idle');
                                if (onAnimationComplete) onAnimationComplete(roll);
                                setTimeout(() => setShowPassGo(false), 2500);
                            }
                        }, 300);
                    };

                    if (roll.hideDice) {
                        startMoving();
                    } else {
                        setAnimationPhase('rolling');
                        setTimeout(() => {
                            setAnimationPhase('result');
                            setTimeout(() => {
                                startMoving();
                            }, 2000);
                        }, 1500);
                    }
                }
            }, [gameState?.activeRoll]);

            return (
                <div className="w-full aspect-square bg-white border-2 border-slate-800 shadow-2xl relative text-slate-900"
                style={{ display: 'grid', gridTemplateColumns: 'repeat(11, minmax(0, 1fr))', gridTemplateRows: 'repeat(11, minmax(0, 1fr))' }} >

                {/* TARJETA PROPIEDAD */}
                {selectedSpace && (
                    <PropertyCard
                        space={selectedSpace}
                        owner={gameState?.players?.find(p => p.properties?.includes(selectedSpace.id))}
                        onClose={() => setSelectedSpace(null)}
                    />
                )}
                
                <div className="bg-[#cde6d0] border border-slate-800 shadow-inner flex flex-col items-center justify-center relative z-0 p-4 sm:p-8" style={{ gridColumn: '2 / 11', gridRow: '2 / 11' }}>
                    <div className="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                    
                    {/* BOTE DE PARKING GRATUITO */}
                    <div className="absolute top-8 sm:top-12 left-8 sm:left-12 bg-white/80 backdrop-blur-md border-2 border-blue-500 rounded-2xl p-2 sm:p-4 shadow-xl flex flex-col items-center justify-center z-10 rotate-[-15deg] min-w-[60px] sm:min-w-[100px]">
                        <span className="text-xl sm:text-4xl mb-1">🚘</span>
                        <span className="text-[6px] sm:text-[10px] font-black uppercase tracking-widest text-slate-600 mb-1 leading-none text-center">Bote<br/>Parking</span>
                        <span className="text-sm sm:text-2xl font-black text-green-600">M{gameState?.freeParkingPot || 0}</span>
                    </div>

                    <div className="rotate-[-45deg] text-center w-full flex items-center justify-center scale-110">
                        <img src="https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/patopoly2_logo_transparent.png" alt="Patopoly Logo" className="w-[95%] max-w-[650px] object-contain" />
                    </div>
                </div>

                {/* OVERLAY: solo opaco en rolling y result */}
                {(animationPhase === 'rolling' || animationPhase === 'result') && currentRoll && (
                    <div className="absolute inset-0 bg-black/70 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
                        {animationPhase === 'rolling' && (
                            <div className="flex gap-6 animate-bounce">
                                <Dices className="w-24 h-24 sm:w-32 sm:h-32 text-white animate-spin drop-shadow-[0_0_20px_rgba(255,255,255,0.9)]" />
                                <Dices className="w-24 h-24 sm:w-32 sm:h-32 text-white animate-spin drop-shadow-[0_0_20px_rgba(255,255,255,0.9)]" style={{animationDirection: 'reverse'}} />
                            </div>
                        )}
                        {animationPhase === 'result' && (
                            <div className="bg-gradient-to-b from-yellow-300 to-yellow-600 p-1 rounded-2xl shadow-[0_0_40px_rgba(250,204,21,0.6)]">
                                <div className="bg-slate-900 px-6 sm:px-10 py-4 sm:py-6 rounded-xl flex flex-col items-center border border-yellow-500/50">
                                    <div className="text-4xl sm:text-6xl mb-2 sm:mb-3 flex justify-center"><TokenIcon tokenId={currentRoll.token} className="w-16 h-16 sm:w-24 sm:h-24 mx-auto" /></div>
                                    <h2 className="text-xl sm:text-3xl font-black text-white uppercase tracking-widest mb-4 text-center">{currentRoll.playerName}</h2>
                                    <div className="flex items-center gap-4 sm:gap-6 text-yellow-400 font-black text-4xl sm:text-6xl">
                                        <div className="bg-black/50 w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center rounded-xl border border-yellow-500/30">{currentRoll.d1}</div>
                                        <span className="text-3xl sm:text-4xl">+</span>
                                        <div className="bg-black/50 w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center rounded-xl border border-yellow-500/30">{currentRoll.d2}</div>
                                    </div>
                                    {currentRoll.isJailFail ? (
                                        <div className="mt-3 sm:mt-5 text-lg sm:text-2xl font-bold text-red-400 uppercase">¡Mala Suerte!</div>
                                    ) : (
                                        <div className="mt-3 sm:mt-5 text-lg sm:text-2xl font-bold text-slate-300">¡Avanza <span className="text-white text-2xl sm:text-3xl">{currentRoll.totalMove}</span> casillas!</div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                )}

                {/* OVERLAY: Has pasado por la Salida */}
                {showPassGo && (
                    <div className="absolute inset-0 z-[60] flex items-center justify-center pointer-events-none">
                        <div className="bg-gradient-to-r from-emerald-500 to-green-600 text-white px-6 py-4 rounded-2xl shadow-2xl border-2 border-green-300 animate-bounce text-center">
                            <div className="text-3xl sm:text-5xl mb-1">🏁</div>
                            <p className="font-black text-sm sm:text-xl uppercase tracking-widest leading-tight">¡Has pasado por la</p>
                            <p className="font-black text-lg sm:text-3xl uppercase">Casilla Salida!</p>
                            <p className="font-black text-2xl sm:text-4xl text-yellow-300 mt-1">+M200</p>
                        </div>
                    </div>
                )}

                {boardSpaces.map((space, index) => {
                    let gridCol, gridRow, borderClasses = "", innerClasses = "flex flex-col items-center justify-between text-center p-0.5 sm:p-1 text-[0.4rem] sm:text-[8px] md:text-[9px] font-bold relative leading-tight tracking-tight";
                    
                    let combinedPosClass = "";
                    if (index > 0 && index < 10) {
                        combinedPosClass = "absolute bottom-full mb-1 sm:mb-2 left-1/2 -translate-x-1/2 z-30"; // Inferior -> Encima (adentro)
                    }
                    else if (index > 10 && index < 20) {
                        combinedPosClass = "absolute right-full mr-1 sm:mr-2 top-1/2 -translate-y-1/2 z-30"; // Izquierda -> a la izquierda (afuera)
                    }
                    else if (index > 20 && index < 30) {
                        combinedPosClass = "absolute top-full mt-1 sm:mt-2 left-1/2 -translate-x-1/2 z-30"; // Superior -> Debajo (adentro)
                    }
                    else if (index > 30 && index < 40) {
                        combinedPosClass = "absolute left-full ml-1 sm:ml-2 top-1/2 -translate-y-1/2 z-30"; // Derecha -> a la derecha (afuera)
                    }
                    
                    if (index >= 0 && index <= 10) {
                        gridRow = 11; gridCol = 11 - index; borderClasses = "border-t border-r border-slate-800";
                        if(index === 0 || index === 10) innerClasses += " p-1 sm:p-2";
                    } else if (index >= 11 && index <= 19) {
                        gridCol = 1; gridRow = 11 - (index - 10); borderClasses = "border-t border-r border-slate-800";
                        innerClasses = innerClasses.replace('flex-col', 'flex-row-reverse');
                    } else if (index >= 20 && index <= 30) {
                        gridRow = 1; gridCol = index - 19; borderClasses = "border-b border-r border-slate-800";
                        innerClasses = innerClasses.replace('flex-col', 'flex-col-reverse');
                        if(index === 20 || index === 30) innerClasses = innerClasses.replace('flex-col-reverse', 'flex-col p-1 sm:p-2');
                    } else if (index >= 31 && index <= 39) {
                        gridCol = 11; gridRow = index - 29; borderClasses = "border-b border-l border-slate-800";
                        innerClasses = innerClasses.replace('flex-col', 'flex-row');
                    }

                    const occupants = playersOnBoard.filter(p => {
                        const pos = displayPositions[p.id] !== undefined ? displayPositions[p.id] : p.position;
                        return pos === index;
                    });
                    
                    // BUSCAMOS SI LA CASILLA TIENE DUEÑO
                    const owner = gameState?.players?.find(p => p.properties?.includes(space.id));

                    return (
                        <div key={index} className={`box-border relative ${occupants.length > 0 ? 'z-50' : 'z-10'} ${borderClasses} ${(space.type==='property'||space.type==='station'||space.type==='utility') ? 'cursor-pointer hover:brightness-95 active:brightness-90 transition-all' : ''}`} style={{ gridColumn: gridCol, gridRow: gridRow }} onClick={() => { if(space.type==='property'||space.type==='station'||space.type==='utility') setSelectedSpace(space); }}>
                            <div className={`w-full h-full ${space.bg || 'bg-white'} ${innerClasses}`}>
                                {space.type === 'property' && (() => {
                                    const bCount = owner?.buildings?.[space.id] || 0;
                                    const isVertical = index > 10 && index < 20 || index > 30;
                                    return (
                                        <div className={`absolute flex items-center justify-center ${index > 10 && index < 20 ? 'right-0 top-0 bottom-0 w-3 sm:w-4' : index > 30 ? 'left-0 top-0 bottom-0 w-3 sm:w-4' : index > 20 && index < 30 ? 'bottom-0 left-0 right-0 h-3 sm:h-4' : 'top-0 left-0 right-0 h-3 sm:h-4'} ${space.color} border-slate-800 ${index > 10 && index < 20 ? 'border-l' : index > 30 ? 'border-r' : index > 20 && index < 30 ? 'border-t' : 'border-b'} z-20 overflow-hidden`}>
                                            {bCount > 0 && bCount < 5 && <span className={`text-[6px] sm:text-[8px] drop-shadow-md leading-none flex items-center ${isVertical ? 'rotate-90' : ''}`}>🏠{bCount > 1 && <span className="font-black text-white ml-px">+{bCount}</span>}</span>}
                                            {bCount === 5 && <span className={`text-[6px] sm:text-[8px] drop-shadow-md leading-none ${isVertical ? 'rotate-90' : ''}`}>🏨</span>}
                                        </div>
                                    );
                                })()}
                                
                                <div className={`z-10 w-full h-full flex-1 flex flex-col items-center justify-center uppercase ${space.type === 'corner' ? 'font-black' : 'leading-none px-0.5'} ${space.type === 'property' ? (index > 10 && index < 20 ? 'pr-3 sm:pr-4' : index > 30 ? 'pl-3 sm:pl-4' : index > 20 && index < 30 ? 'pb-3 sm:pb-4' : 'pt-3 sm:pt-4') : ''}`}>
                                    
                                    {/* SALIDA */}
                                    {space.id === 0 && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center p-1 w-full h-full">
                                            <span className="text-[3vw] sm:text-[2vw] md:text-xl drop-shadow-md leading-none mb-1">🏁</span>
                                            <span className="text-[1.5vw] sm:text-[1vw] md:text-[8px] font-black text-red-600 uppercase tracking-tighter leading-none w-full text-center truncate">SALIDA</span>
                                        </div>
                                    )}

                                    {/* VISITAS / CÁRCEL */}
                                    {space.id === 10 && (
                                        <div className="absolute inset-0 w-full h-full flex flex-col">
                                            <div className="flex-1 flex items-center justify-center border-b-2 border-slate-800 bg-black/10 relative overflow-hidden">
                                                {/* Persona en la cárcel */}
                                                <span className="text-[4vw] sm:text-[2vw] md:text-2xl drop-shadow-md z-0 text-slate-300">👤</span>
                                                {/* Rejas de la cárcel */}
                                                <div className="absolute inset-0 flex justify-evenly pointer-events-none border-x-4 border-slate-700">
                                                    <div className="w-[10%] bg-slate-700 h-full shadow-inner border-r border-slate-600/50"></div>
                                                    <div className="w-[10%] bg-slate-700 h-full shadow-inner border-r border-slate-600/50"></div>
                                                    <div className="w-[10%] bg-slate-700 h-full shadow-inner border-r border-slate-600/50"></div>
                                                    <div className="w-[10%] bg-slate-700 h-full shadow-inner border-r border-slate-600/50"></div>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-center py-0.5 sm:py-1">
                                                <span className="text-[1.5vw] sm:text-[1vw] md:text-[9px] font-black text-orange-800 uppercase tracking-widest leading-none w-full text-center">VISITAS</span>
                                            </div>
                                        </div>
                                    )}

                                    {/* PARKING GRATUITO */}
                                    {space.id === 20 && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center p-1 w-full h-full">
                                            <span className="text-[1.2vw] sm:text-[0.8vw] md:text-[7px] font-black text-blue-700 uppercase tracking-tighter leading-none w-full text-center truncate">PARKING</span>
                                            <span className="text-[3vw] sm:text-[2vw] md:text-xl drop-shadow-md leading-none my-0.5">🚗</span>
                                            <span className="text-[1.2vw] sm:text-[0.8vw] md:text-[7px] font-black text-blue-700 uppercase tracking-tighter leading-none w-full text-center truncate">GRATUITO</span>
                                        </div>
                                    )}

                                    {/* VAYA A LA CÁRCEL */}
                                    {space.id === 30 && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center p-1 w-full h-full">
                                            <span className="text-[3vw] sm:text-[2vw] md:text-xl drop-shadow-md leading-none mb-0.5">🚨</span>
                                            <span className="text-[1.2vw] sm:text-[0.8vw] md:text-[7px] font-black text-red-700 uppercase tracking-tighter leading-none w-full text-center truncate">VAYA A LA</span>
                                            <span className="text-[1.2vw] sm:text-[0.8vw] md:text-[7px] font-black text-red-700 uppercase tracking-tighter leading-none w-full text-center truncate">CÁRCEL</span>
                                        </div>
                                    )}

                                    {/* Nombre genérico e iconos para casillas no-corner */}
                                    {space.type !== 'corner' && (
                                        <>
                                            {space.type === 'station' && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">🚂</span>}
                                            {space.type === 'utility' && space.id === 12 && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">💡</span>}
                                            {space.type === 'utility' && space.id === 28 && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">🚰</span>}
                                            {space.type === 'tax' && space.id === 4 && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">💰</span>}
                                            {space.type === 'tax' && space.id === 38 && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">💎</span>}
                                            {space.type === 'chance' && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">❓</span>}
                                            {space.type === 'community' && <span className="text-[2.5vw] sm:text-[1.5vw] md:text-base drop-shadow-sm mb-0.5 leading-none">🎁</span>}
                                            <span className="text-center font-bold leading-none break-words max-w-full text-[0.35rem] sm:text-[7px] md:text-[8px] mt-0.5">{space.name}</span>
                                        </>
                                    )}
                                </div>

                                {/* ETIQUETA COMBINADA: nombre/EN VENTA (sin precio si hay dueño) */}
                                {(space.type === 'property' || space.type === 'station' || space.type === 'utility') && (() => {
                                    const isMortgaged = owner?.mortgaged?.includes(space.id);
                                    return (
                                        <div className={`flex flex-col items-center justify-center px-1 sm:px-1.5 py-[1px] rounded shadow-md border transition-all ${combinedPosClass} ${owner ? (isMortgaged ? 'bg-red-950 text-red-100 border-red-800' : 'bg-slate-800 text-white border-slate-600') : 'bg-green-400 text-green-950 border-green-500 shadow-[0_0_10px_rgba(74,222,128,0.3)]'}`}>
                                            <span className="text-[5px] sm:text-[7px] md:text-[9px] font-black tracking-wider whitespace-nowrap leading-none">
                                                {owner ? owner.name : 'EN VENTA'}
                                            </span>
                                            {isMortgaged && (
                                                <span className="text-[4px] sm:text-[5px] md:text-[6px] font-black px-1 rounded-sm leading-none whitespace-nowrap bg-red-900 text-red-300 border border-red-700 mt-px">
                                                    HIPOTECADA
                                                </span>
                                            )}
                                            {!owner && space.price > 0 && (
                                                <span className="text-[5px] sm:text-[7px] md:text-[9px] font-black px-1 py-[1px] rounded-sm leading-none whitespace-nowrap bg-green-500/20 text-green-900 border border-green-500/30 mt-px">
                                                    M{space.price}
                                                </span>
                                            )}
                                        </div>
                                    );
                                })()}
                                
                                {occupants.length > 0 && space.id !== 10 && (() => {
                                    const cnt = occupants.length;
                                    const gridCls = cnt === 1 ? 'grid-cols-1' : cnt <= 4 ? 'grid-cols-2' : 'grid-cols-3';
                                    const iconCls = cnt === 1 ? 'w-8 h-8 sm:w-12 sm:h-12' : cnt <= 4 ? 'w-6 h-6 sm:w-8 sm:h-8' : 'w-4 h-4 sm:w-6 sm:h-6';
                                    return (
                                        <div className={`absolute inset-0 flex items-center justify-center bg-black/10 z-40 pointer-events-none p-1 ${space.type === 'property' ? (index > 10 && index < 20 ? 'pr-4 sm:pr-5' : index > 30 ? 'pl-4 sm:pl-5' : index > 20 && index < 30 ? 'pb-4 sm:pb-5' : 'pt-4 sm:pt-5') : ''}`}>
                                            <div className={`grid ${gridCls} gap-0.5 place-items-center`}>
                                                {occupants.map((p, i) => {
                                                    let tipPos = "bottom-full mb-1";
                                                    if (index > 10 && index < 20) tipPos = "left-full ml-1";
                                                    else if (index > 20 && index < 30) tipPos = "top-full mt-1";
                                                    else if (index > 30) tipPos = "right-full mr-1";
                                                    return (
                                                        <div key={i} className="relative flex items-center justify-center">
                                                            <div className={`absolute flex items-center pointer-events-none z-40 ${tipPos}`}>
                                                                <div className="bg-blue-700 text-white text-[6px] sm:text-[9px] font-black px-1.5 py-0.5 rounded-md whitespace-nowrap shadow-xl border border-blue-400 leading-tight flex items-center gap-1 animate-breathe origin-center">
                                                                    <TokenIcon tokenId={p.token} className="w-2.5 h-2.5 sm:w-3 sm:h-3" /> {p.name}
                                                                </div>
                                                            </div>
                                                            <TokenIcon tokenId={p.token} className={`${iconCls} drop-shadow-md`} />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })()}
                                {occupants.length > 0 && space.id === 10 && (
                                    <div className="absolute inset-0 flex flex-col z-40 pointer-events-none">

                                        <div className="flex flex-col gap-2 w-full sm:w-auto">
                                            <button onClick={copyJoinUrl} className={`px-4 py-3 sm:px-6 sm:py-4 rounded-xl font-bold uppercase tracking-wider transition-all flex items-center justify-center gap-2 shadow-lg border ${copied ? 'bg-green-500 hover:bg-green-400 border-green-400 text-white shadow-green-900/50' : 'bg-slate-700 hover:bg-slate-600 border-slate-500 text-white hover:scale-105'}`}>
                                                {copied ? <CheckCircle2 className="w-5 h-5" /> : <Copy className="w-5 h-5" />}
                                                {copied ? '¡Copiado!' : 'Copiar Enlace'}
                                            </button>
                                            <span className="text-xs text-slate-500 text-center font-bold">ID: {activeGameId.split('_')[1] || activeGameId}</span>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="flex-1 flex flex-col md:flex-row gap-8 overflow-hidden">
                                <div className="flex-1 overflow-y-auto custom-scrollbar pr-4">
                                    <h3 className="text-xl font-black text-white uppercase tracking-wider mb-4 pb-2 border-b border-slate-700/50 flex justify-between items-center">
                                        <span>Jugadores</span>
                                        <span className="bg-slate-800 text-slate-300 text-sm py-1 px-3 rounded-full border border-slate-700">{gameState.mode === 'family' ? gameState.players.filter(p=>p.hasJoined).length : gameState.players.length}/{gameState.mode === 'family' ? gameState.players.length : '6'}</span>
                                    </h3>
                                    <div className="grid gap-3">
                                        {gameState.players.map((p, i) => (
                                            <div key={i} className={`p-4 rounded-xl flex items-center gap-4 transition-all ${p.hasJoined || gameState.mode === 'online' ? 'bg-slate-800/80 border border-slate-700 shadow-lg' : 'bg-slate-800/30 border border-slate-700/50 opacity-60'}`}>
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-slate-900 border ${p.hasJoined || gameState.mode === 'online' ? 'border-white/20' : 'border-dashed border-white/20'}`}>
                                                    {p.hasJoined ? <TokenIcon tokenId={p.token} className="w-8 h-8" /> : (gameState.mode === 'online' ? '👤' : <span className="text-slate-600">?</span>)}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="font-bold text-lg text-white truncate">{p.name}</p>
                                                    <p className="text-xs text-slate-400 uppercase tracking-wider font-bold">
                                                        {p.hasJoined ? 'Listo para jugar' : (gameState.mode === 'online' ? 'En la sala' : 'Esperando jugador...')}
                                                    </p>
                                                </div>
                                                {p.hasJoined && <CheckCircle2 className="w-6 h-6 text-green-400" />}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="md:w-[400px] flex flex-col gap-4">
                                    <div className="bg-slate-800/50 rounded-2xl p-6 border border-slate-700 h-full flex flex-col justify-center items-center text-center">
                                        <div className="w-24 h-24 mb-6 rounded-full bg-slate-900 flex items-center justify-center border-4 border-slate-700 shadow-inner relative">
                                            <div className="absolute inset-0 border-4 border-t-blue-500 rounded-full animate-spin"></div>
                                            <span className="text-4xl">🎲</span>
                                        </div>
                                        {gameState.mode === 'family' ? (
                                            <>
                                                <h3 className="text-2xl font-black text-white uppercase tracking-wider mb-2">Preparando la mesa</h3>
                                                <p className="text-slate-400 leading-relaxed text-sm">Escanea el código QR desde tu móvil para elegir tu ficha y unirte a la partida. El juego comenzará automáticamente cuando todos estén listos.</p>
                                            </>
                                        ) : (
                                            <>
                                                <h3 className="text-2xl font-black text-white uppercase tracking-wider mb-2">{isHost ? 'Comenzar Partida' : 'Esperando al anfitrión'}</h3>
                                                <p className="text-slate-400 leading-relaxed text-sm mb-6">
                                                    {isHost ? 'Cuando todos tus amigos estén en la sala, pulsa el botón para empezar.' : 'El anfitrión de la sala iniciará la partida en breve...'}
                                                </p>
                                                {isHost ? (
                                                    <button onClick={handleStartOnlineGame} disabled={!canStart} className="w-full py-4 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-black text-xl shadow-[0_0_20px_rgba(34,197,94,0.4)] transition-all uppercase tracking-wider disabled:opacity-50 disabled:cursor-not-allowed">
                                                        Empezar
                                                    </button>
                                                ) : null}
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Fase initRoll: todos listos, esperando tiradas de orden
            if (allJoined && gameState.status !== 'playing') {
                const initRolls = gameState.initRolls || {};
                const allRolled = gameState.players.every(p => initRolls[p.id] !== undefined);
                
                return (
                    <div className="min-h-screen bg-cover bg-center flex items-center justify-center p-8" style={{ backgroundImage: `url(${BACKGROUND_URL})` }}>
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-0"></div>
                        <div className="glass-panel rounded-3xl p-8 max-w-lg w-full text-center text-white shadow-2xl relative z-10">
                            <div className="text-5xl mb-4">🎲</div>
                            <h2 className="text-3xl font-black uppercase mb-2">¡Todos Listos!</h2>
                            <p className="text-slate-300 mb-8">Cada jugador lanza los dados para determinar el orden de juego.</p>
                            
                            <div className="flex flex-col gap-3 mb-6">
                                {[...gameState.players]
                                    .sort((a, b) => {
                                        if (allRolled) {
                                            return ((initRolls[b.id]?.d1 || 0) + (initRolls[b.id]?.d2 || 0)) - ((initRolls[a.id]?.d1 || 0) + (initRolls[a.id]?.d2 || 0));
                                        }
                                        return 0;
                                    })
                                    .map((p, i) => {
                                        const roll = initRolls[p.id];
                                        const total = roll ? roll.d1 + roll.d2 : null;
                                        return (
                                            <div key={p.id} className={`flex items-center justify-between px-5 py-3 rounded-xl border transition-all ${roll ? 'bg-green-500/15 border-green-500/40' : 'bg-white/5 border-white/10'}`}>
                                                <div className="flex items-center gap-3">
                                                    {allRolled && <span className="text-xl font-black text-yellow-400 w-6">#{i + 1}</span>}
                                                    <TokenIcon tokenId={p.token} className="w-8 h-8" />
                                                    <span className="font-bold text-white">{p.name}</span>
                                                </div>
                                                {roll ? (
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl">{roll.d1 === 1 ? '⚀' : roll.d1 === 2 ? '⚁' : roll.d1 === 3 ? '⚂' : roll.d1 === 4 ? '⚃' : roll.d1 === 5 ? '⚄' : '⚅'}</span>
                                                        <span className="text-2xl">{roll.d2 === 1 ? '⚀' : roll.d2 === 2 ? '⚁' : roll.d2 === 3 ? '⚂' : roll.d2 === 4 ? '⚃' : roll.d2 === 5 ? '⚄' : '⚅'}</span>
                                                        <span className="font-black text-xl text-green-400 ml-1">= {total}</span>
                                                    </div>
                                                ) : (
                                                    <span className="text-slate-400 text-sm italic">Tirando...</span>
                                                )}
                                            </div>
                                        );
                                    })}
                            </div>

                            {allRolled && (
                                <div className="mt-4 p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-xl text-center">
                                    <p className="text-yellow-400 font-black text-lg">🏆 ¡Empieza {[...gameState.players].sort((a,b) => ((initRolls[b.id]?.d1||0)+(initRolls[b.id]?.d2||0))-((initRolls[a.id]?.d1||0)+(initRolls[a.id]?.d2||0)))[0]?.name}!</p>
                                    <p className="text-slate-200 text-sm mt-2 font-bold animate-pulse">¡Mirad vuestros móviles y dadle a ACEPTAR para empezar la partida!</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Si todos están listos y la partida ha empezado, muestra el tablero central (modo host)
            return (
                <div className="min-h-screen bg-cover bg-center flex items-center justify-center p-2 relative overflow-hidden" style={{ backgroundImage: `url(https://raw.githubusercontent.com/AVS-PROJECTS33/PATOPOLY/main/Gemini_Generated_Image_9q9p9s9q9p9s9q9p.png)` }}>
                    <div className="absolute inset-0 bg-slate-900/30 backdrop-blur-sm z-0"></div>
                    <div className="w-full max-w-[96vh] relative z-10 drop-shadow-2xl">
                        <Board gameState={gameState} />
                    </div>
                </div>
            );
        }

        // --- TRADE MANAGER COMPONENT ---
        function TradeManager({ gameState, playerId, gameId, onClose }) {
            const trade = gameState.activeTrade;
            if (!trade) return null;

            const isP1 = trade.p1Id === playerId;
            const isP2 = trade.p2Id === playerId;
            if (!isP1 && !isP2) return null; // Only participants see this

            const myOffer = isP1 ? trade.p1Offer : trade.p2Offer;
            const theirOffer = isP1 ? trade.p2Offer : trade.p1Offer;
            const me = gameState.players.find(p => p.id === playerId);
            const them = gameState.players.find(p => p.id === (isP1 ? trade.p2Id : trade.p1Id));

            // Local state for editing money (to avoid constant firestore writes while typing)
            const [localMoney, setLocalMoney] = useState(myOffer.money.toString());

            useEffect(() => {
                setLocalMoney(myOffer.money.toString());
            }, [myOffer.money, trade.status]);

            const handleToggleProperty = async (propId) => {
                if (myOffer.locked || trade.status !== 'building') return;
                const newProps = myOffer.properties.includes(propId) 
                    ? myOffer.properties.filter(id => id !== propId)
                    : [...myOffer.properties, propId];
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        [`activeTrade.${isP1 ? 'p1Offer' : 'p2Offer'}.properties`]: newProps
                    });
                } catch(e) { console.error(e); }
            };

            const handleMoneyChange = (val) => {
                if (myOffer.locked || trade.status !== 'building') return;
                setLocalMoney(val);
            };

            const handleMoneyBlur = async () => {
                if (myOffer.locked || trade.status !== 'building') return;
                let num = parseInt(localMoney, 10);
                if (isNaN(num) || num < 0) num = 0;
                if (num > me.balance) num = me.balance;
                setLocalMoney(num.toString());
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        [`activeTrade.${isP1 ? 'p1Offer' : 'p2Offer'}.money`]: num
                    });
                } catch(e) { console.error(e); }
            };

            const toggleLock = async () => {
                try {
                    const newLocked = !myOffer.locked;
                    const updates = {
                        [`activeTrade.${isP1 ? 'p1Offer' : 'p2Offer'}.locked`]: newLocked
                    };
                    // If we are locking, and the other person is already locked, transition to 'review'
                    if (newLocked && theirOffer.locked) {
                        updates['activeTrade.status'] = 'review';
                    }
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updates);
                } catch(e) { console.error(e); }
            };

            const handleReject = async () => {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        activeTrade: null,
                        tradeAlert: { message: `El jugador ${me.name} ha rechazado el trueque.`, type: 'error', timestamp: Date.now() },
                        logs: [...(gameState.logs || []), `El trueque entre ${me.name} y ${them.name} ha sido cancelado.`]
                    });
                    if (onClose) onClose();
                } catch(e) { console.error(e); }
            };

            const handleAccept = async () => {
                try {
                    const updates = {
                        [`activeTrade.${isP1 ? 'p1Offer' : 'p2Offer'}.accepted`]: true
                    };
                    
                    // If the other person has already accepted, execute trade
                    if (theirOffer.accepted) {
                        const newPlayers = JSON.parse(JSON.stringify(gameState.players));
                        const p1Data = newPlayers.find(p => p.id === trade.p1Id);
                        const p2Data = newPlayers.find(p => p.id === trade.p2Id);
                        
                        // Execute money transfer
                        p1Data.balance = p1Data.balance - trade.p1Offer.money + trade.p2Offer.money;
                        p2Data.balance = p2Data.balance - trade.p2Offer.money + trade.p1Offer.money;
                        
                        // Execute properties transfer
                        trade.p1Offer.properties.forEach(pid => {
                            p1Data.properties = p1Data.properties.filter(id => id !== pid);
                            p2Data.properties.push(pid);
                        });
                        trade.p2Offer.properties.forEach(pid => {
                            p2Data.properties = p2Data.properties.filter(id => id !== pid);
                            p1Data.properties.push(pid);
                        });

                        updates.activeTrade = null;
                        updates.tradeAlert = { message: `¡Enhorabuena! Trueque aceptado.`, type: 'success', timestamp: Date.now() };
                        updates.players = newPlayers;
                        updates.logs = [...(gameState.logs || []), `¡Trueque completado entre ${me.name} y ${them.name}!`];
                        
                        if (gameState.awaitingRent && 
                           ((gameState.awaitingRent.playerId === trade.p1Id && gameState.awaitingRent.toPlayerId === trade.p2Id) || 
                            (gameState.awaitingRent.playerId === trade.p2Id && gameState.awaitingRent.toPlayerId === trade.p1Id))) {
                            updates.awaitingRent = null;
                            updates.currentTurnIndex = gameState.awaitingRent.nextTurnIndex;
                            updates.logs.push(`¡La deuda de alquiler fue saldada con el trueque!`);
                        }

                        await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updates);
                        if (onClose) onClose();
                    } else {
                        await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updates);
                    }
                } catch(e) { console.error(e); }
            };

            // Helpers for rendering properties
            const renderProps = (offerProps, ownerProps, isMe, ownerPlayer) => {
                const rawProps = isMe ? ownerProps : offerProps;
                // Filtrar propiedades hipotecadas
                const availableProps = rawProps ? rawProps.filter(id => !(ownerPlayer.mortgaged && ownerPlayer.mortgaged.includes(id))) : [];

                if (!availableProps || availableProps.length === 0) return <p className="text-slate-500 text-xs text-center py-4">Ninguna propiedad libre de hipoteca</p>;
                
                const propDatas = availableProps.map(id => boardSpaces.find(s => s.id === id)).filter(Boolean);
                
                return (
                    <div className="grid grid-cols-2 gap-2 mt-2">
                        {propDatas.map(p => {
                            const isSelected = offerProps.includes(p.id);
                            return (
                                <div key={p.id} onClick={() => isMe ? handleToggleProperty(p.id) : null}
                                    className={`relative rounded-lg border-2 p-1 text-center select-none overflow-hidden flex flex-col justify-center min-h-[40px] shadow-sm ${isMe ? 'cursor-pointer hover:scale-105 active:scale-95 transition-all' : ''} ${isSelected ? 'border-green-400 ring-2 ring-green-400 ring-offset-1 ring-offset-slate-900 opacity-100' : 'border-white/30 opacity-90 brightness-75 hover:brightness-100 hover:opacity-100'}`}
                                    style={{ backgroundColor: p.colorHex || (p.type === 'station' ? '#374151' : '#4b5563') }}>
                                    <div className="text-[9px] sm:text-[10px] font-black uppercase leading-tight text-white drop-shadow-md z-10">{p.name}</div>
                                    {isSelected && <div className="absolute top-0 right-0 bg-green-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-bl-lg shadow-md z-20 flex items-center justify-center">✓</div>}
                                    {!isSelected && isMe && <div className="absolute inset-0 bg-black/40 z-0 pointer-events-none"></div>}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-2 sm:p-4 bg-black/80 backdrop-blur-md animate-in fade-in duration-300">
                    <div className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-4xl flex flex-col h-[90vh] md:h-auto md:max-h-[85vh] overflow-hidden relative">
                        <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                            <h2 className="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-400 uppercase tracking-widest flex items-center gap-2">
                                <ArrowRightLeft className="w-6 h-6 text-orange-400" /> Mesa de Trueque
                            </h2>
                            {trade.status === 'building' && (
                                <button onClick={handleReject} className="text-red-400 hover:text-red-300 font-bold uppercase text-sm border border-red-500/30 px-3 py-1 rounded-lg">Cancelar</button>
                            )}
                        </div>
                        
                        {trade.status === 'building' ? (
                            <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                                {/* MI LADO */}
                                <div className="flex-1 p-4 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col overflow-hidden bg-slate-900/30">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-black text-white uppercase text-lg">Mi Oferta</h3>
                                        {myOffer.locked && <span className="text-xs bg-green-500/20 text-green-400 font-bold px-2 py-1 rounded border border-green-500/30">Lista</span>}
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                        <p className="text-xs text-slate-400 uppercase tracking-widest font-bold border-b border-slate-800 pb-1">Calles (Selecciona para añadir)</p>
                                        {renderProps(myOffer.properties, me.properties, true, me)}
                                    </div>
                                    
                                    <div className="mt-4 bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                                        <p className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-2">Dinero a Pagar</p>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl font-black text-green-400">M</span>
                                            <input type="number" min="0" max={me.balance} value={localMoney} onChange={e => handleMoneyChange(e.target.value)} onBlur={handleMoneyBlur} disabled={myOffer.locked} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white font-bold outline-none focus:border-orange-500" />
                                        </div>
                                    </div>
                                    
                                    <button onClick={toggleLock} className={`w-full mt-4 py-3 rounded-xl font-black uppercase tracking-wider transition-all shadow-md ${myOffer.locked ? 'bg-slate-700 text-white border border-slate-600' : 'bg-gradient-to-r from-orange-500 to-yellow-600 text-white hover:from-orange-400 hover:to-yellow-500'}`}>
                                        {myOffer.locked ? 'Modificar Oferta' : 'Fijar Mi Oferta'}
                                    </button>
                                </div>
                                
                                {/* SU LADO */}
                                <div className="flex-1 p-4 flex flex-col overflow-hidden bg-slate-900/30">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-black text-white uppercase text-lg">Oferta de {them.name}</h3>
                                        {theirOffer.locked ? <span className="text-xs bg-green-500/20 text-green-400 font-bold px-2 py-1 rounded border border-green-500/30">Lista</span> : <span className="text-xs text-orange-400/70 font-bold animate-pulse">Editando...</span>}
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                        <p className="text-xs text-slate-400 uppercase tracking-widest font-bold border-b border-slate-800 pb-1">Calles Solicitadas</p>
                                        {renderProps(theirOffer.properties, them.properties, false, them)}
                                    </div>
                                    
                                    <div className="mt-4 bg-slate-800/50 p-3 rounded-xl border border-slate-700 flex flex-col justify-center min-h-[80px]">
                                        <p className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-1">Dinero Recibido</p>
                                        <p className="text-3xl font-black text-green-400">M{theirOffer.money}</p>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            // REVIEW PHASE
                            <div className="flex-1 p-4 sm:p-8 flex flex-col items-center justify-center text-center">
                                <h3 className="text-2xl font-black text-white uppercase mb-2">Revisión de Oferta Final</h3>
                                <p className="text-slate-400 mb-8">Ambos jugadores han fijado sus ofertas. Si ambos aceptan, el trato se cerrará inmediatamente.</p>
                                
                                <div className="flex flex-col sm:flex-row gap-6 w-full max-w-2xl mb-8">
                                    <div className="flex-1 bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                        <h4 className="font-black text-orange-400 uppercase border-b border-slate-700 pb-2 mb-2">Tú das:</h4>
                                        {myOffer.properties.length > 0 ? (
                                            <div className="flex flex-wrap gap-1 justify-center mb-3">
                                                {myOffer.properties.map(id => {
                                                    const s = boardSpaces.find(bs=>bs.id===id);
                                                    return <span key={id} className="text-[10px] font-black uppercase px-2 py-1 rounded text-white shadow-sm border border-white/20" style={{ backgroundColor: s.colorHex || (s.type === 'station' ? '#374151' : '#4b5563') }}>{s.name}</span>;
                                                })}
                                            </div>
                                        ) : <p className="text-xs text-slate-500 mb-3">Ninguna calle</p>}
                                        <p className="text-xl font-black text-green-400">M{myOffer.money}</p>
                                    </div>
                                    <div className="flex items-center justify-center"><ArrowRightLeft className="w-8 h-8 text-slate-500" /></div>
                                    <div className="flex-1 bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                        <h4 className="font-black text-orange-400 uppercase border-b border-slate-700 pb-2 mb-2">{them.name} da:</h4>
                                        {theirOffer.properties.length > 0 ? (
                                            <div className="flex flex-wrap gap-1 justify-center mb-3">
                                                {theirOffer.properties.map(id => {
                                                    const s = boardSpaces.find(bs=>bs.id===id);
                                                    return <span key={id} className="text-[10px] font-black uppercase px-2 py-1 rounded text-white shadow-sm border border-white/20" style={{ backgroundColor: s.colorHex || (s.type === 'station' ? '#374151' : '#4b5563') }}>{s.name}</span>;
                                                })}
                                            </div>
                                        ) : <p className="text-xs text-slate-500 mb-3">Ninguna calle</p>}
                                        <p className="text-xl font-black text-green-400">M{theirOffer.money}</p>
                                    </div>
                                </div>
                                
                                <div className="flex gap-4 w-full max-w-md">
                                    <button onClick={handleReject} className="flex-1 py-4 rounded-xl bg-slate-800 border border-slate-600 hover:bg-red-900/30 hover:border-red-500 hover:text-red-400 font-black text-white uppercase transition-colors">Rechazar</button>
                                    <button onClick={handleAccept} disabled={myOffer.accepted} className={`flex-1 py-4 rounded-xl font-black uppercase transition-all ${myOffer.accepted ? 'bg-green-600/50 border-green-500 text-white cursor-wait' : 'bg-green-600 hover:bg-green-500 text-white shadow-[0_0_15px_rgba(34,197,94,0.4)]'}`}>
                                        {myOffer.accepted ? 'Esperando al otro...' : 'Aceptar Trato'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- PLAYER CONTROLLER (ONLINE VIEW) ---
        function PlayerController({ gameId, user, playerId, setPlayerId }) {
            const [gameState, setGameState] = useState(null);
            const [selectedToken, setSelectedToken] = useState('');
            const [selectedSpacePC, setSelectedSpacePC] = useState(null);
            const [activeTab, setActiveTab] = useState('patrimonio');
            const [showTurnSplash, setShowTurnSplash] = useState(false);
            const [showTradeSelector, setShowTradeSelector] = useState(false);
            const [showBankruptcyConfirm, setShowBankruptcyConfirm] = useState(false);
            const [prevTurnIndex, setPrevTurnIndex] = useState(null);
            const [balanceDiff, setBalanceDiff] = useState(null);
            const prevBalanceRef = useRef(null);

            const handleBankruptcy = async () => {
                if (!gameState) return;
                const me = gameState.players.find(p => p.id === playerId);
                if (!me) return;
                
                const updates = {
                    players: gameState.players.map(p => {
                        if (p.id === playerId) {
                            return { ...p, isBankrupt: true, properties: [], buildings: {}, balance: 0 };
                        }
                        return p;
                    }),
                    logs: [...(gameState.logs || []), `🚨 ¡${me.name} SE HA DECLARADO EN BANCARROTA Y QUEDA ELIMINADO!`]
                };

                // Clear any active states
                if (gameState.awaitingRent?.playerId === playerId) updates.awaitingRent = null;
                if (gameState.awaitingTax?.playerId === playerId) updates.awaitingTax = null;
                if (gameState.awaitingPurchase?.playerId === playerId) updates.awaitingPurchase = null;
                if (gameState.awaitingUtilityRoll?.playerId === playerId) updates.awaitingUtilityRoll = null;
                if (gameState.activeCard?.playerId === playerId) updates.activeCard = null;
                if (gameState.activeTrade && (gameState.activeTrade.p1Id === playerId || gameState.activeTrade.p2Id === playerId)) {
                    updates.activeTrade = null;
                }

                // Advance turn if it's currently their turn
                if (gameState.players[gameState.currentTurnIndex].id === playerId) {
                    let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                    let loopCount = 0;
                    while ((!updates.players[nextTurn].hasJoined || updates.players[nextTurn].isBankrupt) && loopCount < gameState.players.length) {
                        nextTurn = (nextTurn + 1) % gameState.players.length;
                        loopCount++;
                    }
                    updates.currentTurnIndex = nextTurn;
                }

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), updates);
                    setShowBankruptcyConfirm(false);
                } catch(e) { console.error(e); }
            };

            useEffect(() => {
                const me = gameState?.players?.find(p => p.id === playerId);
                if (me) {
                    if (prevBalanceRef.current !== null) {
                        const diff = me.balance - prevBalanceRef.current;
                        if (diff !== 0) {
                            setBalanceDiff(diff);
                            const timer = setTimeout(() => setBalanceDiff(null), 4000);
                            prevBalanceRef.current = me.balance;
                            return () => clearTimeout(timer);
                        }
                    } else {
                        prevBalanceRef.current = me.balance;
                    }
                }
            }, [gameState?.players?.find(p => p.id === playerId)?.balance, playerId]);

            useEffect(() => {
                const hasBlockingAlert = (gameState?.rentReceivedAlert && gameState.rentReceivedAlert.playerId === playerId) || gameState?.tradeAlert;
                if (gameState && gameState.status === 'playing' && gameState.currentTurnIndex !== prevTurnIndex) {
                    if (hasBlockingAlert && gameState.players[gameState.currentTurnIndex].id === playerId) {
                        return; // Wait until alerts are cleared
                    }
                    setPrevTurnIndex(gameState.currentTurnIndex);
                    if (gameState.players[gameState.currentTurnIndex].id === playerId) {
                        setShowTurnSplash(true);
                    }
                }
            }, [gameState?.currentTurnIndex, gameState?.status, prevTurnIndex, playerId, gameState?.players, gameState?.rentReceivedAlert, gameState?.tradeAlert]);
            
            // Heartbeat Logic for Presence
            useEffect(() => {
                if (!playerId || !gameId) return;
                const interval = setInterval(async () => {
                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                            [`lastSeen.${playerId}`]: Date.now()
                        });
                    } catch(e) {}
                }, 5000);
                return () => clearInterval(interval);
            }, [playerId, gameId]);
            
            // Trade Alert Timeout Logic
            useEffect(() => {
                if (gameState?.tradeAlert) {
                    const timer = setTimeout(async () => {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { tradeAlert: null });
                        } catch(e) { console.error(e); }
                    }, 5000);
                    return () => clearTimeout(timer);
                }
            }, [gameState?.tradeAlert, gameId]);
            
            useEffect(() => {
                if (!user || !gameId) return;
                const gameRef = doc(db, 'artifacts', appId, 'games', gameId);
                const unsubscribe = onSnapshot(gameRef, (docSnap) => {
                    if (docSnap.exists()) setGameState(docSnap.data());
                });
                return () => unsubscribe();
            }, [user, gameId]);

            const handleJoin = async (targetPlayerId) => {
                if (!selectedToken) return;
                const updatedPlayers = gameState.players.map(p => p.id === targetPlayerId ? { ...p, hasJoined: true, token: selectedToken } : p);
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { 
                        players: updatedPlayers,
                        logs: [...(gameState.logs || []), `¡${gameState.players.find(p=>p.id===targetPlayerId).name} se ha unido con ${selectedToken}!`]
                    });
                    setPlayerId(targetPlayerId);
                    sessionStorage.setItem(`patopoly_playerId_${gameId}`, targetPlayerId);
                } catch (error) { console.error(error); }
            };

            const rollDice = async () => {
                SoundFX.dice();
                if (gameState.players[gameState.currentTurnIndex].id !== playerId) return; // No es tu turno
                if (gameState.isAnimating) return; // Bloquear si hay animación en curso
                
                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                const totalMove = d1 + d2;
                const isDoubles = d1 === d2;
                
                const me = gameState.players.find(p => p.id === playerId);

                // --- JAIL LOGIC ---
                if (me.inJail) {
                    let newJailTurns = (me.jailTurns || 0) + 1;
                    
                    if (isDoubles) {
                        let logMsg = `¡${me.name} tiró ${d1} y ${d2} (dobles) y sale de la cárcel gratis! Se mueve ${totalMove}.`;
                        let newPos = (me.position + totalMove) % 40;
                        const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, position: newPos } : p);
                        
                        let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                        let loopCount = 0;
                        while ((!gameState.players[nextTurn].hasJoined || gameState.players[nextTurn].isBankrupt) && loopCount < gameState.players.length) { nextTurn = (nextTurn + 1) % gameState.players.length; loopCount++; }
                        
                        const activeRoll = { playerId: me.id, playerName: me.name, token: me.token, d1, d2, totalMove, from: me.position, to: newPos, nextTurnIndex: nextTurn, timestamp: Date.now(), passedGo: false };
                        try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { players: updatedPlayers, activeRoll, isAnimating: true, logs: [...(gameState.logs || []), logMsg] }); } catch(e) { console.error(e); }
                        return;
                    } else {
                        if (newJailTurns >= 3) {
                            let newBalance = Math.max(0, me.balance - 50);
                            let newPos = (me.position + totalMove) % 40;
                            let logMsg = `¡${me.name} tiró ${d1} y ${d2}. Al ser su 3er turno, pagó M50 obligatoriamente, sale de la cárcel y mueve ${totalMove}.`;
                            const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, inJail: false, jailTurns: 0, balance: newBalance, position: newPos } : p);
                            
                            let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                            let loopCount = 0;
                            while ((!gameState.players[nextTurn].hasJoined || gameState.players[nextTurn].isBankrupt) && loopCount < gameState.players.length) { nextTurn = (nextTurn + 1) % gameState.players.length; loopCount++; }
                            
                            const activeRoll = { playerId: me.id, playerName: me.name, token: me.token, d1, d2, totalMove, from: me.position, to: newPos, nextTurnIndex: nextTurn, timestamp: Date.now(), passedGo: false };
                            try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { players: updatedPlayers, freeParkingPot: (gameState.freeParkingPot || 0) + 50, activeRoll, isAnimating: true, logs: [...(gameState.logs || []), logMsg] }); } catch(e) { console.error(e); }
                            return;
                        } else {
                            let logMsg = `${me.name} tiró ${d1} y ${d2}. No sacó dobles y sigue en la cárcel (Turno ${newJailTurns}).`;
                            const updatedPlayers = gameState.players.map(p => p.id === playerId ? { ...p, jailTurns: newJailTurns } : p);
                            let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                            let loopCount = 0;
                            while ((!gameState.players[nextTurn].hasJoined || gameState.players[nextTurn].isBankrupt) && loopCount < gameState.players.length) { nextTurn = (nextTurn + 1) % gameState.players.length; loopCount++; }
                            
                            const activeRoll = { playerId: me.id, playerName: me.name, token: me.token, d1, d2, totalMove: 0, from: me.position, to: me.position, nextTurnIndex: nextTurn, timestamp: Date.now(), passedGo: false, isJailFail: true };
                            try { await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), { players: updatedPlayers, activeRoll, isAnimating: true, logs: [...(gameState.logs || []), logMsg] }); } catch(e) { console.error(e); }
                            return;
                        }
                    }
                }
                // --- END JAIL LOGIC ---

                let newPos = me.position + totalMove;
                let passedGo = false;

                if (newPos >= 40) {
                    newPos = newPos % 40;
                    passedGo = true;
                }

                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === playerId) {
                        return { ...p, position: newPos };
                    }
                    return p;
                });

                // Calculamos el siguiente turno pero NO actualizamos currentTurnIndex todavía
                let nextTurn = (gameState.currentTurnIndex + 1) % gameState.players.length;
                let loopCount = 0;
                while ((!gameState.players[nextTurn].hasJoined || gameState.players[nextTurn].isBankrupt) && loopCount < gameState.players.length) {
                    nextTurn = (nextTurn + 1) % gameState.players.length;
                    loopCount++;
                }

                let logMsg = `${me.name} tiró ${d1} y ${d2} (${totalMove}) y cayó en ${boardSpaces[newPos].name}.`;

                const activeRoll = {
                    playerId: me.id,
                    playerName: me.name,
                    token: me.token,
                    d1, d2, totalMove,
                    from: me.position,
                    to: newPos,
                    nextTurnIndex: nextTurn,
                    timestamp: Date.now(),
                    passedGo
                };

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'games', gameId), {
                        players: updatedPlayers,
                        activeRoll: activeRoll,
                        isAnimating: true,
                        logs: [...(gameState.logs || []), logMsg]
                    });
                } catch(e) { console.error(e); }
            };

            const handleAnimationComplete = async (roll) => {
                if (roll.playerId === playerId) {
                    if (roll.isUtilityRoll) {
